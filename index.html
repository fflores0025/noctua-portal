<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>InOut Media · Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAi9e2CzdgQ6QwqCS6NCYXVI_8Ng-BZTfo",
      authDomain: "inout-connect.firebaseapp.com",
      projectId: "inout-connect",
      storageBucket: "inout-connect.firebasestorage.app",
      messagingSenderId: "299676465112",
      appId: "1:299676465112:web:93ebc6041c5e8170e464ad"
    };
    const app = initializeApp(firebaseConfig);
    window._firebase = {
      auth: getAuth(app), db: getFirestore(app),
      signInWithEmailAndPassword, signOut, onAuthStateChanged,
      createUserWithEmailAndPassword, doc, getDoc, setDoc,
      collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#07070f; --surf:#0d0d1a; --card:#111120; --border:#1c1c2e;
      --a1:#c8ff00; --a2:#ff3cac; --a3:#00d4ff;
      --txt:#e6e6f0; --muted:#60607a; --r:13px; --sidebar:240px;
    }
    html,body { height:100%; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--txt); background:var(--bg); overflow-x:hidden; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    #app { display:flex; min-height:100vh; }
    .sidebar { width:var(--sidebar); min-height:100vh; background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:200; transition:transform .25s cubic-bezier(.4,0,.2,1); }
    .main-area { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { height:56px; background:var(--surf); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; position:sticky; top:0; z-index:100; }
    @media(max-width:480px){ .topbar{height:52px;padding:0 12px;} }
    .main-content { flex:1; padding:28px 24px; max-width:1100px; width:100%; margin:0 auto; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:150; }
    .overlay.show { display:block; }
    .s-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-weight:800; font-size:19px; letter-spacing:-.5px; display:flex; align-items:center; justify-content:space-between; }
    .s-logo-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; line-height:1; }
    .s-logo-close:hover { color:var(--txt); }
    .logo-dot { color:var(--a1); }
    .s-user { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; transition:background .15s; }
    .s-user:hover { background:rgba(255,255,255,.04); }
    .s-user-arrow { margin-left:auto; color:var(--muted); font-size:14px; transition:all .2s; }
    .s-user:hover .s-user-arrow { color:var(--a1); transform:translateX(2px); }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--a1); color:#000; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; flex-shrink:0; }
    .av-pink{background:var(--a2);color:#fff;} .av-blue{background:var(--a3);color:#000;} .av-gray{background:var(--muted);color:#fff;}
    .u-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .u-role { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .nav { flex:1; padding:8px 0; overflow-y:auto; }
    .nav-sec { padding:10px 20px 4px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; cursor:pointer; color:var(--muted); transition:all .15s; font-size:13px; border-left:2px solid transparent; user-select:none; }
    .nav-item:hover { color:var(--txt); background:rgba(255,255,255,.03); }
    .nav-item.active { color:var(--a1); border-left-color:var(--a1); background:rgba(200,255,0,.05); }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .s-bottom { padding:14px 20px; border-top:1px solid var(--border); }
    .btn-logout { width:100%; padding:9px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all .15s; }
    .btn-logout:hover { border-color:var(--a2); color:var(--a2); }
    .burger { background:none; border:none; color:var(--txt); font-size:20px; cursor:pointer; padding:4px; display:none; }
    .topbar-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .notif-btn { width:34px; height:34px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; transition:border-color .15s; }
    .notif-btn:hover { border-color:var(--a1); }
    .page-hd { margin-bottom:24px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .page-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; letter-spacing:-.5px; }
    .page-sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:20px; }
    .card-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:14px; }
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;} .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;} .g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .mb16{margin-bottom:16px;} .mb24{margin-bottom:24px;} .flex{display:flex;} .items-c{align-items:center;} .j-between{justify-content:space-between;}
    .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; }
    .stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .stat-val { font-family:'Syne',sans-serif; font-size:26px; font-weight:700; letter-spacing:-1px; }
    .stat-note { font-size:12px; color:var(--muted); margin-top:4px; }
    .c-a1{color:var(--a1);} .c-a2{color:var(--a2);} .c-a3{color:var(--a3);}
    .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
    .b-green{background:rgba(200,255,0,.12);color:var(--a1);} .b-pink{background:rgba(255,60,172,.12);color:var(--a2);} .b-blue{background:rgba(0,212,255,.12);color:var(--a3);} .b-gray{background:rgba(107,107,136,.15);color:var(--muted);} .b-orange{background:rgba(255,165,0,.12);color:#ffa500;}
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;}
    .tbl-wrap::-webkit-scrollbar{height:3px;}
    .tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:rgba(255,255,255,.02);}
    .prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:2px;background:var(--a1);}
    .prog-fill.blue{background:var(--a3);}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
    .btn-p{background:var(--a1);color:#000;} .btn-p:hover{background:#d4ff20;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);} .btn-g:hover{color:var(--txt);border-color:var(--muted);}
    .btn-danger{background:rgba(255,60,172,.1);color:var(--a2);border:1px solid rgba(255,60,172,.2);}
    .btn-full{width:100%;justify-content:center;}
    .t-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .t-row:last-child{border-bottom:none;}
    .t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .d-evento{background:var(--a2);} .d-oficina{background:var(--a3);} .d-rodaje{background:var(--a1);} .d-libre{background:var(--muted);}
    .t-dia{width:85px;font-size:13px;font-weight:500;flex-shrink:0;}
    .t-hrs{font-size:12px;color:var(--muted);width:115px;flex-shrink:0;}
    .t-lug{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nom-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;}
    .nom-row:last-child{border-bottom:none;}
    .nom-total{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--a1);}
    .irpf-big{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:var(--a1);text-align:center;line-height:1;}
    input[type=range]{width:100%;accent-color:var(--a1);cursor:pointer;height:4px;}

    /* Calendario interactivo */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
    .cal-hd{text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;background:var(--bg);border:1px solid var(--border);user-select:none;position:relative;}
    .cal-day:hover{border-color:var(--a3);background:rgba(0,212,255,.05);}
    .cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
    .cal-day.today{border-color:var(--a1);color:var(--a1);font-weight:700;}
    .cal-day.selected{background:rgba(200,255,0,.14);border-color:var(--a1);color:var(--a1);}
    .cal-day.has-event::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--a2);}
    .cal-day.has-turno::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--a3);}
    .cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;}
    .day-detail{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-top:16px;animation:fadeIn .2s ease;}
    .day-detail-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--a1);}
    .day-event-item{padding:12px;background:var(--card);border-radius:9px;border:1px solid var(--border);margin-bottom:8px;}
    .day-event-item:last-child{margin-bottom:0;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* Perfil */
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;}
    .info-row:last-child{border-bottom:none;}
    .info-lbl{color:var(--muted);font-size:13px;}

    /* Evento card */
    .ev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s,transform .2s;cursor:pointer;}
    .ev-card:hover{border-color:rgba(200,255,0,.25);transform:translateY(-2px);}
    .ev-nombre{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin:8px 0 6px;}
    .ev-meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;}
    .proy-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
    .proy-nom{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px;}
    .proy-cli{font-size:12px;color:var(--muted);margin-bottom:14px;}

    /* Form */
    .form-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:14px;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--a1);}
    .form-textarea{resize:vertical;min-height:80px;}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px;}
    .modal-bg.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;}
    .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;margin-top:-4px;}
    .modal-close:hover{color:var(--a2);}

    /* Login */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 60% 40% at 50% -5%,rgba(200,255,0,.09) 0%,transparent 65%),radial-gradient(ellipse 40% 30% at 85% 85%,rgba(255,60,172,.07) 0%,transparent 55%);}
    .login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;}
    .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;margin-bottom:6px;}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.4;}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:1000;transition:transform .3s;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    @media(max-width:768px){
      :root{--sidebar:260px;}
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,.7);}
      .main-area{margin-left:0;}
      .burger{display:flex!important;}
      .main-content{padding:16px 14px;}
      .g4{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr;} .g2{grid-template-columns:1fr;}
      .g-auto{grid-template-columns:1fr;}
      .page-title{font-size:20px;} .irpf-big{font-size:40px;} .nom-total{font-size:20px;}
      .page-hd{margin-bottom:16px;}
      .card{padding:16px;}
      .stat{padding:14px;}
      .stat-val{font-size:22px;}
      .btn{padding:8px 12px;font-size:13px;}
      .modal{padding:20px;}
      .tbl-wrap{border-radius:8px;}
      thead th{font-size:10px;padding:6px 8px;}
      tbody td{padding:10px 8px;font-size:12px;}
      .t-dia{width:70px;font-size:12px;}
      .t-hrs{width:90px;font-size:11px;}
      .cal-day{font-size:12px;border-radius:7px;}
      .cal-hd{font-size:10px;padding:4px 2px;}
      .ev-nombre{font-size:13px;}
      .nav-item{padding:11px 20px;}
    }
    @media(max-width:480px){
      .g4{grid-template-columns:1fr 1fr;}
      .g3{grid-template-columns:1fr;}
      .topbar-title{font-size:14px;}
      .main-content{padding:12px;}
      .page-title{font-size:18px;}
      .card{padding:14px;}
      .stat-val{font-size:20px;}
      .modal{max-height:85vh;padding:18px;}
    }
    /* Touch improvements */
    @media(hover:none){
      .nav-item:hover{background:transparent;color:var(--muted);}
      .nav-item.active:hover{background:rgba(200,255,0,.05);color:var(--a1);}
      .btn:active{opacity:.8;transform:scale(.97);}
      .ev-card:hover{transform:none;}
      .cal-day:active{background:rgba(0,212,255,.1);border-color:var(--a3);}
    }
  </style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">InOut<span class="logo-dot">.</span></div>
    <div class="login-sub">Portal del equipo · InOut Media</div>
    <div id="login-error" style="display:none;background:rgba(255,60,172,.1);border:1px solid rgba(255,60,172,.2);color:var(--a2);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;"></div>
    <label class="form-lbl">Email</label>
    <input class="form-input" id="login-email" type="email" placeholder="tu@noctua.es" autocomplete="email"/>
    <label class="form-lbl">Contraseña</label>
    <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn btn-p btn-full" id="login-btn" onclick="doLogin()" style="font-size:15px;padding:12px">Entrar al portal</button>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">¿Sin acceso? Contacta con el administrador</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="s-logo">
      <span>InOut<span class="logo-dot">.</span></span>
      <button class="s-logo-close" onclick="closeSidebar()" title="Cerrar menú">✕</button>
    </div>
    <div class="s-user" onclick="navigate('perfil')" title="Ver mi perfil">
      <div class="avatar" id="s-avatar">--</div>
      <div style="flex:1;min-width:0">
        <div class="u-name" id="s-name">—</div>
        <div class="u-role" id="s-role">—</div>
      </div>
      <span class="s-user-arrow">›</span>
    </div>
    <nav class="nav" id="nav-items"></nav>
    <div class="s-bottom">
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button class="burger" id="burger-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbar-title">Portal</span>
      <div class="topbar-right">
        <div class="notif-btn" onclick="toast('Sin notificaciones nuevas')">🔔</div>
        <div class="avatar" id="tb-avatar" style="width:32px;height:32px;font-size:11px;cursor:pointer" onclick="navigate('perfil')">--</div>
      </div>
    </div>
    <div class="main-content" id="page-content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ── ESTADO ──────────────────────────────────────────────────────────────
const DEMO_MODE = true;
let currentUser=null, userProfile=null, currentPage="dashboard";

// ── DATOS DEMO ───────────────────────────────────────────────────────────
const DEMO_PROFILES = {
  admin:    {nombre:"Carlos Mendez",role:"admin",    dept:"Dirección",    email:"carlos@noctua.es",irpf:20,salarioBase:3200},
  rrhh:     {nombre:"Sofía Ruiz",   role:"rrhh",     dept:"RRHH",         email:"sofia@noctua.es", irpf:15,salarioBase:2600},
  empleado: {nombre:"Javier López", role:"empleado", dept:"Producción AV",email:"javier@noctua.es",irpf:15,salarioBase:2400},
  freelance:{nombre:"Ana Torres",   role:"freelance",dept:"Eventos",      email:"ana@noctua.es",   irpf:15,salarioBase:0},
};

let DEMO_NOMINAS=[];  // Se carga desde Firestore por usuario

let DEMO_EVENTOS=[];  // Se carga desde Firestore

function toast(msg,ms=2800){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),ms);}
function canAdmin(){return["admin","rrhh"].includes(userProfile?.role);}
function initials(n){return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();}
function avatarColor(r){return r==="admin"?"av-blue":r==="rrhh"?"av-pink":r==="freelance"?"av-gray":"";}

function badge(e){
  const m={pagada:["b-green","Pagada"],pendiente:["b-orange","Pendiente"],confirmado:["b-green","Confirmado"],produccion:["b-blue","En producción"],preproduccion:["b-gray","Preproducción"],negociacion:["b-orange","Negociación"],activo:["b-green","Activo"],cerrado:["b-gray","Cerrado"],baja:["b-pink","Baja"]};
  const[c,l]=m[e]||["b-gray",e];return`<span class="badge ${c}">${l}</span>`;
}
function tipoBadge(t){return t==="fijo"?'<span class="badge b-blue">Fijo</span>':'<span class="badge b-orange">Freelance</span>';}
function roleBadge(r){const m={admin:"b-pink Admin",rrhh:"b-blue RRHH",empleado:"b-gray Empleado",freelance:"b-orange Freelance"};const s=(m[r]||"b-gray "+r).split(" ");return`<span class="badge ${s[0]}">${s.slice(1).join(" ")}</span>`;}

function showModal(h){document.getElementById("modal-body").innerHTML=h;document.getElementById("modal-bg").classList.add("show");}

// ── AUTH ─────────────────────────────────────────────────────────────────
function setLoginError(msg){
  const el=document.getElementById("login-error");
  el.textContent=msg; el.style.display=msg?"block":"none";
}
function setLoginLoading(on){
  document.getElementById("login-btn").disabled=on;
  document.getElementById("login-btn").textContent=on?"Entrando…":"Entrar al portal";
}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim();
  const pass=document.getElementById("login-pass").value;
  setLoginError("");
  if(!email||!pass){setLoginError("Introduce email y contraseña.");return;}
  setLoginLoading(true);
  try{
    const{auth,signInWithEmailAndPassword,db,doc,getDoc}=window._firebase;
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    currentUser=cred.user;
    const snap=await getDoc(doc(db,"Usuarios",currentUser.uid));
    if(!snap.exists()){
      setLoginError("Perfil no encontrado. Contacta con el administrador.");
      await window._firebase.signOut(auth);
      setLoginLoading(false);return;
    }
    userProfile=snap.data();
    enterApp();
  }catch(e){
    setLoginLoading(false);
    const msgs={"auth/invalid-credential":"Email o contraseña incorrectos.","auth/user-not-found":"Email no registrado.","auth/wrong-password":"Contraseña incorrecta.","auth/too-many-requests":"Demasiados intentos. Espera unos minutos.","auth/invalid-email":"Email no válido."};
    setLoginError(msgs[e.code]||"Error al iniciar sesión: "+e.message);
  }
}

document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

async function doLogout(){
  const{auth,signOut}=window._firebase;
  await signOut(auth);
  currentUser=null;userProfile=null;
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("login-email").value="";
  document.getElementById("login-pass").value="";
  closeSidebar();
}

// Mantener sesión al recargar
window.addEventListener("load",()=>{
  const{auth,onAuthStateChanged,db,doc,getDoc}=window._firebase;
  onAuthStateChanged(auth,async user=>{
    if(user&&!userProfile){
      currentUser=user;
      try{
        const snap=await getDoc(doc(db,"Usuarios",user.uid));
        if(snap.exists()){userProfile=snap.data();enterApp();}
      }catch(e){console.warn("Sin perfil:",e);}
    }
  });
});

async function enterApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  const ini=initials(userProfile.nombre),avc=avatarColor(userProfile.role);
  ["s-avatar","tb-avatar"].forEach(id=>{const el=document.getElementById(id);el.textContent=ini;el.className=`avatar ${avc}`;});
  document.getElementById("s-name").textContent=userProfile.nombre;
  document.getElementById("s-role").textContent=userProfile.role;
  buildNav(userProfile.role);
  // Cargar datos desde Firestore
  await cargarEventos();
  await cargarProyectos();
  await cargarMisNominas();
  await cargarMisTurnos();
  if(canAdminRole(userProfile.role)){
    await cargarEmpleados();
    await cargarTodosLosTurnos();
  }
  navigate("dashboard");
}

function canAdminRole(r){return["admin","rrhh"].includes(r);}

async function cargarMisNominas(){
  try{
    const{db,collection,query,where,getDocs,orderBy}=window._firebase;
    const q=query(collection(db,"nominas"),where("empleadoId","==",currentUser.uid));
    const snap=await getDocs(q);
    DEMO_NOMINAS=snap.docs.map(d=>({id:d.id,...d.data()}));
    DEMO_NOMINAS.sort((a,b)=>(b.fechaCreacion||"").localeCompare(a.fechaCreacion||""));
  }catch(e){console.warn("Error cargando nóminas:",e);DEMO_NOMINAS=[];}
}

async function cargarMisTurnos(){
  try{
    const{db,collection,query,where,getDocs}=window._firebase;
    const q=query(collection(db,"turnos"),where("empleadoId","==",currentUser.uid));
    const snap=await getDocs(q);
    DEMO_TURNOS=snap.docs.map(d=>({id:d.id,...d.data()}));
    DEMO_TURNOS.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  }catch(e){console.warn("Error cargando turnos:",e);DEMO_TURNOS=[];}
}

async function cargarTodosLosTurnos(){

async function cargarEmpleados(){
  try{
    const{db,collection,getDocs}=window._firebase;
    const snap=await getDocs(collection(db,"Usuarios"));
    DEMO_EMPLEADOS=snap.docs.map(d=>{
      const data=d.data();
      return {
        id:d.id,
        nombre:data.nombre||data.Nombre||"—",
        email:data.email||data["e-mail"]||"—",
        role:data.role||data.Rol||"empleado",
        dept:data.dept||data.departamento||data.Departamento||"—",
        tipo:data.tipo||"fijo",
        irpf:data.irpf||data.IRPF||15,
        salario:data.salarioBase||data["Salario base"]||0,
        salarioBase:data.salarioBase||0,
        estado:data.estado||"activo",
        tlf:data.tlf||data.telefono||"—",
        fechaAlta:data.fechaAlta||"—",
      };
    });
  }catch(e){console.warn("Error cargando empleados:",e);}
}

function buildNav(role){
  const items=NAV_CONFIG[role]||NAV_CONFIG.empleado;
  document.getElementById("nav-items").innerHTML=items.map(i=>i.sec?`<div class="nav-sec">${i.sec}</div>`:`<div class="nav-item" id="nav-${i.key}" onclick="navigate('${i.key}')"><span class="nav-icon">${i.icon}</span><span>${i.label}</span></div>`).join("");
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  document.getElementById(`nav-${page}`)?.classList.add("active");
  document.getElementById("topbar-title").textContent=PAGE_TITLE[page]||page;
  closeSidebar();
  const pc=document.getElementById("page-content");pc.scrollTop=0;
  ({dashboard,perfil:renderPerfil,nominas:renderNominas,retribuciones:renderRetribuciones,calendario:renderCalendario,eventos:renderEventos,produccion:renderProduccion,admin:renderAdmin,"admin-irpf":renderAdminIRPF,"admin-nominas":renderAdminNominas,"admin-turnos":renderAdminTurnos}[page]||dashboard)(pc);
}

// ── CALENDARIO INTERACTIVO ────────────────────────────────────────────────
function renderCalendario(pc){
  const dias=["L","M","X","J","V","S","D"];
  const ahora=new Date();
  const calYear=ahora.getFullYear();
  const calMonth=ahora.getMonth(); // 0-based
  const primerDia=new Date(calYear,calMonth,1);
  const ultimoDia=new Date(calYear,calMonth+1,0).getDate();
  // offset: lunes=0 ... domingo=6
  const offset=(primerDia.getDay()+6)%7;
  const total=ultimoDia;
  const all=[];for(let i=0;i<offset;i++)all.push(null);for(let d=1;d<=total;d++)all.push(d);while(all.length%7!==0)all.push(null);
  const mesStr=String(calMonth+1).padStart(2,"0");
  // Días con eventos reales
  const eventDays=new Set(DEMO_EVENTOS.map(e=>{
    const m=e.fecha.match(new RegExp(`${calYear}-${mesStr}-(\\d{2})`));
    return m?parseInt(m[1]):null;
  }).filter(Boolean));
  // Días con turnos reales del usuario
  const turnoDias={};
  DEMO_TURNOS.forEach(t=>{
    const m=t.fecha&&t.fecha.match(new RegExp(`${calYear}-${mesStr}-(\\d{2})`));
    if(m)turnoDias[parseInt(m[1])]=t.tipo;
  });
  const dotColor={evento:"var(--a2)",rodaje:"var(--a1)",oficina:"var(--a3)",libre:"var(--muted)"};
  const mesesNombres=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  pc.innerHTML=`
    <div class="page-hd">
      <div class="flex items-c j-between" style="width:100%;flex-wrap:wrap;gap:8px">
        <div><div class="page-title">Calendario Laboral</div><div class="page-sub">${mesesNombres[calMonth]} ${calYear} · Pulsa un día para ver su detalle</div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)">
          ${Object.entries(dotColor).map(([k,v])=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${v};display:inline-block"></span>${k}</span>`).join("")}
        </div>
      </div>
    </div>
    <div class="card mb16">
      <div class="cal-grid">
        ${dias.map(d=>`<div class="cal-hd">${d}</div>`).join("")}
        ${all.map(n=>{
          if(!n)return`<div class="cal-day empty"></div>`;
          const hoyD=new Date();
          const isToday=(n===hoyD.getDate()&&calMonth===hoyD.getMonth()&&calYear===hoyD.getFullYear());
          const hasEv=eventDays.has(n);
          const tipoTurno=turnoDias[n];
          return`<div class="cal-day ${isToday?"today":""} ${hasEv?"has-event":tipoTurno?"has-turno":""}" id="cal-day-${n}" onclick="selectDay(${n})">${n}${tipoTurno?`<div class="cal-dot" style="background:${dotColor[tipoTurno]}"></div>`:""}</div>`;
        }).join("")}
      </div>
    </div>
    <div id="day-detail-area"></div>
    <div class="card">
      <div class="card-title">Tus turnos próximos</div>
      ${DEMO_TURNOS.length===0
        ?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">No tienes turnos asignados aún</div>`
        :DEMO_TURNOS.slice(0,7).map(t=>{
          const d=new Date(t.fecha+"T12:00:00");
          const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
          const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
          const label=`${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
          return`<div class="t-row"><span class="t-dia">${label}</span><span class="t-dot d-${t.tipo}"></span><span class="t-hrs">${t.tipo==="libre"?"Libre":`${t.entrada}–${t.salida}`}</span><span class="t-lug">${t.lugar||"—"}</span><span class="badge ${t.tipo==="libre"?"b-gray":t.tipo==="evento"?"b-pink":t.tipo==="rodaje"?"b-green":"b-blue"}" style="margin-left:auto;flex-shrink:0">${t.tipo}</span></div>`;
        }).join("")
      }
    </div>`;
}

function selectDay(n){
  document.querySelectorAll(".cal-day.selected").forEach(el=>el.classList.remove("selected"));
  document.getElementById(`cal-day-${n}`)?.classList.add("selected");
  const ahora2=new Date();
  const cY=ahora2.getFullYear(),cM=ahora2.getMonth()+1;
  const fechaDia=`${cY}-${String(cM).padStart(2,"0")}-${String(n).padStart(2,"0")}`;
  const evs=DEMO_EVENTOS.filter(e=>e.fecha===fechaDia);
  const turno=DEMO_TURNOS.find(t=>t.fecha===fechaDia);
  const area=document.getElementById("day-detail-area");
  const ahora3=new Date();
  const mesesN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  let html=`<div class="day-detail"><div class="day-detail-title">📅 ${n} de ${mesesN[ahora3.getMonth()]} de ${ahora3.getFullYear()}</div>`;
  if(turno){
    html+=`<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Tu turno</div>
      <div class="day-event-item" style="display:flex;align-items:center;gap:10px">
        <span class="t-dot d-${turno.tipo}" style="width:9px;height:9px"></span>
        <div><div style="font-weight:500">${turno.tipo==="libre"?"Día libre":turno.lugar}</div><div style="font-size:12px;color:var(--muted)">${turno.entrada==="—"?"Sin horario asignado":`${turno.entrada} – ${turno.salida}`}</div></div>
      </div></div>`;
  }
  if(evs.length>0){
    html+=`<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Eventos del día</div>
      ${evs.map(ev=>`<div class="day-event-item" style="cursor:pointer" onclick="verEvento('${ev.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-family:Syne,sans-serif;font-weight:600;font-size:14px">${ev.nombre}</span>${badge(ev.estado)}
        </div>
        <div style="font-size:12px;color:var(--muted)">📍 ${ev.lugar} · 👥 ${ev.equipo} personas</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${ev.notas}</div>
      </div>`).join("")}</div>`;
  }
  if(!turno&&evs.length===0){
    html+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">Sin actividad registrada${canAdmin()?`<br><button class="btn btn-p" style="margin-top:10px" onclick="nuevoEvento()">+ Añadir evento</button>`:""}</div>`;
  }else if(canAdmin()){
    html+=`<div style="margin-top:12px"><button class="btn btn-g" style="font-size:12px" onclick="nuevoEvento()">+ Añadir evento en este día</button></div>`;
  }
  html+=`</div>`;
  area.innerHTML=html;
  area.scrollIntoView({behavior:"smooth",block:"nearest"});
}

async function guardarEvento(){
  const nombre=document.getElementById("ev-nombre").value.trim();
  if(!nombre){toast("⚠️ El nombre es obligatorio");return;}
  const ev={nombre,fecha:document.getElementById("ev-fecha").value||new Date().toISOString().slice(0,10),lugar:document.getElementById("ev-lugar").value||"Por confirmar",tipo:document.getElementById("ev-tipo").value,estado:document.getElementById("ev-estado").value,equipo:parseInt(document.getElementById("ev-equipo").value)||1,notas:document.getElementById("ev-notas").value||"—",creadoPor:userProfile.nombre,creadoEn:new Date().toISOString()};
  try{
    const{db,collection,addDoc}=window._firebase;
    const ref=await addDoc(collection(db,"eventos"),ev);
    ev.id=ref.id;
    toast(`Evento "${nombre}" guardado en base de datos ✓`);
  }catch(e){
    ev.id="e"+Date.now();
    toast(`Evento "${nombre}" creado localmente`);
  }
  DEMO_EVENTOS.unshift(ev);closeModal();
  if(currentPage==="eventos")renderEventos(document.getElementById("page-content"));
  if(currentPage==="calendario")renderCalendario(document.getElementById("page-content"));
}

function editEvento(id){
  const ev=DEMO_EVENTOS.find(e=>e.id===id);if(!ev)return;
  closeModal();
  setTimeout(()=>showModal(`<button class="modal-close" onclick="closeModal()">✕</button><div class="modal-title">Editar evento</div>
    <label class="form-lbl">Nombre</label><input class="form-input" id="ee-nombre" value="${ev.nombre}"/>
    <label class="form-lbl">Fecha</label><input class="form-input" id="ee-fecha" type="date" value="${ev.fecha}"/>
    <label class="form-lbl">Lugar</label><input class="form-input" id="ee-lugar" value="${ev.lugar}"/>
    <label class="form-lbl">Estado</label><select class="form-select" id="ee-estado">${["preproduccion","confirmado","produccion","negociacion","cerrado"].map(s=>`<option value="${s}" ${ev.estado===s?"selected":""}>${s}</option>`).join("")}</select>
    <label class="form-lbl">Notas</label><textarea class="form-textarea" id="ee-notas">${ev.notas}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" style="flex:1;justify-content:center" onclick="actualizarEvento('${ev.id}')">Guardar</button>
      <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="eliminarEvento('${ev.id}')">Eliminar</button>
    </div>`),100);
}

async function actualizarEvento(id){
  const ev=DEMO_EVENTOS.find(e=>e.id===id);if(!ev)return;
  ev.nombre=document.getElementById("ee-nombre").value.trim()||ev.nombre;
  ev.fecha=document.getElementById("ee-fecha").value||ev.fecha;
  ev.lugar=document.getElementById("ee-lugar").value||ev.lugar;
  ev.estado=document.getElementById("ee-estado").value;
  ev.notas=document.getElementById("ee-notas").value;
  try{
    const{db,doc,updateDoc}=window._firebase;
    await updateDoc(doc(db,"eventos",id),{nombre:ev.nombre,fecha:ev.fecha,lugar:ev.lugar,estado:ev.estado,notas:ev.notas});
    toast("Evento actualizado ✓");
  }catch(e){toast("Actualizado localmente");}
  closeModal();
  if(currentPage==="eventos")renderEventos(document.getElementById("page-content"));
  if(currentPage==="calendario")renderCalendario(document.getElementById("page-content"));
}

async function eliminarEvento(id){
  try{
    const{db,doc,deleteDoc}=window._firebase;
    await deleteDoc(doc(db,"eventos",id));
  }catch(e){console.warn("No se pudo borrar de Firebase:",e);}
  DEMO_EVENTOS=DEMO_EVENTOS.filter(e=>e.id!==id);
  toast("Evento eliminado");closeModal();
  if(currentPage==="eventos")renderEventos(document.getElementById("page-content"));
}

    const snap=await getDocs(q);
    nominasGeneradas=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
  const yaGenerado=(empId)=>nominasGeneradas.find(n=>n.empleadoId===empId);
  pc.innerHTML=`
    <div class="page-hd">
      <div><div class="page-title">Nóminas del equipo</div><div class="page-sub">Gestión y generación · ${mesActual}</div></div>
      <button class="btn btn-p" onclick="generarTodasNominas('${mesActual}')">⚡ Generar todas</button>
    </div>
    <div class="g3 mb16">
      <div style="text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Total bruto mensual</div>
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:22px">${totalBruto.toLocaleString()}€</div>
      </div>
      <div style="text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Empleados fijos activos</div>
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:22px;color:var(--a3)">${empleadosFijos.length}</div>
      </div>
      <div style="text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Nóminas generadas este mes</div>
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:22px;color:var(--a2)">${nominasGeneradas.length}/${empleadosFijos.length}</div>
      </div>
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th>Empleado</th><th>Tipo</th><th>Bruto</th><th>IRPF</th><th>SS</th><th>Neto est.</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        ${DEMO_EMPLEADOS.filter(e=>e.estado==="activo").map(e=>{
          const ss=e.salario>0?160:0;
          const ret=Math.round(e.salario*(e.irpf||15)/100);
          const neto=e.salario-ret-ss;
          const gen=yaGenerado(e.id);
          return`<tr>
            <td style="font-weight:500">${e.nombre}</td>
            <td>${tipoBadge(e.tipo)}</td>
            <td>${e.salario>0?e.salario.toLocaleString()+"€":"Caché"}</td>
            <td>${e.irpf||15}%</td>
            <td>${ss>0?ss+"€":"—"}</td>
            <td style="color:var(--a1);font-weight:600">${e.salario>0?neto.toLocaleString()+"€":"—"}</td>
            <td>${gen?badge("pagada"):e.salario>0?badge("pendiente"):badge("cerrado")}</td>
            <td>${e.salario>0?`<div style="display:flex;gap:6px">
              <button class="btn btn-p" style="padding:4px 10px;font-size:11px" onclick="generarNominaEmp('${e.id}','${mesActual}')">${gen?"Regenerar":"Generar"}</button>
              ${gen?`<button class="btn btn-g" style="padding:4px 10px;font-size:11px" onclick="descargarNominaPDF('${gen.id}')">PDF</button>`:""}
            </div>`:"—"}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table></div></div>`;
}

async function generarNominaEmp(empleadoId,mes){
  const e=DEMO_EMPLEADOS.find(x=>x.id===empleadoId);if(!e||e.salario<=0)return;
  const ss=160,ret=Math.round(e.salario*(e.irpf||15)/100),neto=e.salario-ret-ss;
  try{
    const{db,collection,addDoc}=window._firebase;
    await addDoc(collection(db,"nominas"),{
      empleadoId,empleadoNombre:e.nombre,mes,
      bruto:e.salario,irpf:e.irpf||15,retencion:ret,ss,neto,
      estado:"pendiente",fechaCreacion:new Date().toISOString(),
      generadoPor:userProfile.nombre,
    });
    toast(`Nómina de ${e.nombre} generada ✓`);
  }catch(err){toast("Error al generar nómina");}
  renderAdminNominas(document.getElementById("page-content"));
}

async function generarTodasNominas(mes){
  let count=0;
  for(const e of DEMO_EMPLEADOS.filter(x=>x.estado==="activo"&&x.salario>0)){
    const ss=160,ret=Math.round(e.salario*(e.irpf||15)/100),neto=e.salario-ret-ss;
    try{
      const{db,collection,addDoc}=window._firebase;
      await addDoc(collection(db,"nominas"),{
        empleadoId:e.id,empleadoNombre:e.nombre,mes,
        bruto:e.salario,irpf:e.irpf||15,retencion:ret,ss,neto,
        estado:"pendiente",fechaCreacion:new Date().toISOString(),
        generadoPor:userProfile.nombre,
      });
      count++;
    }catch(err){}
  }
  toast(`${count} nóminas generadas ✓`);
  renderAdminNominas(document.getElementById("page-content"));
}

function descargarNominaPDF(id){
  const n=DEMO_NOMINAS.find(x=>x.id===id)||{};
  generarPDFNomina(n);
}


// ── ADMIN: GESTIÓN DE TURNOS REAL ────────────────────────────────────────
async function renderAdminTurnos(pc){
  await cargarTodosLosTurnos();
  const hoy=new Date();
  const lunes=new Date(hoy);lunes.setDate(hoy.getDate()-((hoy.getDay()+6)%7));
  const semana=[];
  for(let i=0;i<7;i++){const d=new Date(lunes);d.setDate(lunes.getDate()+i);semana.push(d);}
  const fmt=d=>d.toISOString().slice(0,10);
  const diasSemana=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

  const turnosPorEmpleadoDia={};

    const key=t.empleadoId+"_"+t.fecha;
    turnosPorEmpleadoDia[key]=t;
  });

  pc.innerHTML=`
    <div class="page-hd">
      <div><div class="page-title">Gestión de Turnos</div><div class="page-sub">Semana del ${lunes.getDate()} al ${new Date(lunes.getTime()+6*864e5).getDate()} de ${meses[lunes.getMonth()]}</div></div>
      <button class="btn btn-p" onclick="abrirNuevoTurno()">+ Asignar turno</button>
    </div>

    <!-- Vista semana por empleado -->
    <div class="card mb16">
      <div class="card-title">Vista semanal del equipo</div>
      <div style="overflow-x:auto">
        <table style="min-width:700px">
          <thead>
            <tr>
              <th style="width:140px">Empleado</th>
              ${semana.map((d,i)=>`<th style="text-align:center;font-size:11px">${diasSemana[i]}<br><span style="color:var(--txt);font-size:13px">${d.getDate()}</span></th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${DEMO_EMPLEADOS.filter(e=>e.estado==="activo").map(e=>`
              <tr>
                <td style="font-weight:500;font-size:13px">${e.nombre}</td>
                ${semana.map(d=>{
                  const t=turnosPorEmpleadoDia[e.id+"_"+fmt(d)];
                  if(!t)return`<td style="text-align:center"><span style="color:var(--muted);font-size:11px">—</span></td>`;
                  const colors={oficina:"var(--a3)",evento:"var(--a2)",rodaje:"var(--a1)",libre:"var(--muted)"};
                  return`<td style="text-align:center;cursor:pointer" onclick="editarTurno('${t.id}')">
                    <div style="background:${colors[t.tipo]||"var(--muted)"}22;border:1px solid ${colors[t.tipo]||"var(--muted)"}44;border-radius:6px;padding:3px 6px;font-size:11px;color:${colors[t.tipo]||"var(--muted)"}">
                      ${t.tipo==="libre"?"Libre":`${t.entrada||""}–${t.salida||""}`}
                    </div>
                  </td>`;
                }).join("")}
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Formulario asignar turno -->
    <div class="card mb16" id="form-turno-card" style="display:none">
      <div class="card-title" id="form-turno-title">Asignar turno</div>
      <input type="hidden" id="turno-edit-id"/>
      <div class="g2">
        <div>
          <label class="form-lbl">Empleado</label>
          <select class="form-select" id="turno-empleado">
            ${DEMO_EMPLEADOS.filter(e=>e.estado==="activo").map(e=>`<option value="${e.id}">${e.nombre}</option>`).join("")}
          </select>
          <label class="form-lbl">Fecha</label>
          <input class="form-input" id="turno-fecha" type="date" value="${fmt(hoy)}"/>
          <label class="form-lbl">Tipo</label>
          <select class="form-select" id="turno-tipo" onchange="toggleLibre()">
            <option value="oficina">Oficina</option>
            <option value="evento">Evento</option>
            <option value="rodaje">Rodaje</option>
            <option value="libre">Libre / Descanso</option>
          </select>
        </div>
        <div id="turno-horario-div">
          <label class="form-lbl">Entrada</label>
          <input class="form-input" id="turno-entrada" type="time" value="09:00"/>
          <label class="form-lbl">Salida</label>
          <input class="form-input" id="turno-salida" type="time" value="17:00"/>
          <label class="form-lbl">Lugar</label>
          <input class="form-input" id="turno-lugar" placeholder="Oficina / Sala / Estudio…"/>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-p" style="flex:1;justify-content:center" onclick="guardarTurno()">Guardar turno</button>
        <button class="btn btn-g" style="flex:1;justify-content:center" onclick="cerrarFormTurno()">Cancelar</button>
      </div>
    </div>

    <!-- Lista completa de turnos -->
    <div class="card">
      <div class="card-title">Todos los turnos asignados (${TURNOS_EQUIPO.length})</div>
      ${TURNOS_EQUIPO.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No hay turnos asignados aún</div>`:`
      <div class="tbl-wrap"><table>
        <thead><tr><th>Empleado</th><th>Fecha</th><th>Tipo</th><th>Horario</th><th>Lugar</th><th></th></tr></thead>
        <tbody>

            const emp=DEMO_EMPLEADOS.find(e=>e.id===t.empleadoId);
            return`<tr>
              <td style="font-weight:500">${emp?emp.nombre:t.empleadoNombre||"—"}</td>
              <td>${t.fecha}</td>
              <td><span class="badge ${t.tipo==="libre"?"b-gray":t.tipo==="evento"?"b-pink":t.tipo==="rodaje"?"b-green":"b-blue"}">${t.tipo}</span></td>
              <td style="color:var(--muted)">${t.tipo==="libre"?"—":`${t.entrada||""}–${t.salida||""}`}</td>
              <td style="color:var(--muted)">${t.lugar||"—"}</td>
              <td><div style="display:flex;gap:6px">
                <button class="btn btn-g" style="padding:4px 8px;font-size:11px" onclick="editarTurno('${t.id}')">Editar</button>
                <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="eliminarTurno('${t.id}')">✕</button>
              </div></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table></div>`}
    </div>`;
}

function abrirNuevoTurno(){
  document.getElementById("form-turno-card").style.display="block";
  document.getElementById("form-turno-title").textContent="Asignar turno";
  document.getElementById("turno-edit-id").value="";
  document.getElementById("form-turno-card").scrollIntoView({behavior:"smooth"});
}

function cerrarFormTurno(){
  document.getElementById("form-turno-card").style.display="none";
}

function toggleLibre(){
  const tipo=document.getElementById("turno-tipo").value;
  document.getElementById("turno-horario-div").style.opacity=tipo==="libre"?"0.3":"1";
  document.getElementById("turno-horario-div").style.pointerEvents=tipo==="libre"?"none":"auto";
}

async function guardarTurno(){
  const empleadoId=document.getElementById("turno-empleado").value;
  const emp=DEMO_EMPLEADOS.find(e=>e.id===empleadoId);
  const editId=document.getElementById("turno-edit-id").value;
  const tipo=document.getElementById("turno-tipo").value;
  const turno={
    empleadoId,
    empleadoNombre:emp?emp.nombre:"—",
    fecha:document.getElementById("turno-fecha").value,
    tipo,
    entrada:tipo==="libre"?"—":document.getElementById("turno-entrada").value,
    salida:tipo==="libre"?"—":document.getElementById("turno-salida").value,
    lugar:tipo==="libre"?"Libre":document.getElementById("turno-lugar").value||"—",
  };
  if(!turno.fecha||!turno.empleadoId){toast("⚠️ Selecciona empleado y fecha");return;}
  try{
    const{db,collection,doc,addDoc,updateDoc}=window._firebase;
    if(editId){
      await updateDoc(doc(db,"turnos",editId),turno);
      toast("Turno actualizado ✓");
    }else{
      await addDoc(collection(db,"turnos"),turno);
      toast(`Turno asignado a ${turno.empleadoNombre} ✓`);
    }
  }catch(e){toast("Guardado localmente");}
  cerrarFormTurno();
  await cargarTodosLosTurnos();
  renderAdminTurnos(document.getElementById("page-content"));
}

function editarTurno(id){
  const t=TURNOS_EQUIPO.find(x=>x.id===id);if(!t)return;
  document.getElementById("form-turno-card").style.display="block";
  document.getElementById("form-turno-title").textContent="Editar turno";
  document.getElementById("turno-edit-id").value=id;
  document.getElementById("turno-empleado").value=t.empleadoId;
  document.getElementById("turno-fecha").value=t.fecha;
  document.getElementById("turno-tipo").value=t.tipo;
  document.getElementById("turno-entrada").value=t.entrada||"09:00";
  document.getElementById("turno-salida").value=t.salida||"17:00";
  document.getElementById("turno-lugar").value=t.lugar||"";
  toggleLibre();
  document.getElementById("form-turno-card").scrollIntoView({behavior:"smooth"});
}

async function eliminarTurno(id){
  try{
    const{db,doc,deleteDoc}=window._firebase;
    await deleteDoc(doc(db,"turnos",id));
    toast("Turno eliminado ✓");
  }catch(e){toast("Eliminado localmente");}
  TURNOS_EQUIPO=TURNOS_EQUIPO.filter(x=>x.id!==id);
  renderAdminTurnos(document.getElementById("page-content"));
}


function generarPDFNomina(n){
  // Obtener datos del perfil actual si la nómina no tiene todos los campos
  const nombre = n.empleadoNombre || userProfile.nombre;
  const dept   = userProfile.dept || "—";
  const email  = userProfile.email || "—";
  const mes    = n.mes || "—";
  const bruto  = n.bruto || userProfile.salarioBase || 0;
  const irpf   = n.irpf  || userProfile.irpf || 15;
  const ret    = n.retencion || Math.round(bruto * irpf / 100);
  const ss     = n.ss || (bruto > 0 ? 160 : 0);
  const neto   = n.neto || (bruto - ret - ss);
  const fecha  = new Date().toLocaleDateString("es-ES", {day:"2-digit",month:"long",year:"numeric"});
  const anio   = new Date().getFullYear();

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Nómina ${nombre} · ${mes}</title>

  .header-right{text-align:right}
  .doc-title{color:#c8ff00;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
  .doc-mes{color:#fff;font-size:18px;font-weight:600;margin-top:4px}
  .body{padding:36px 40px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;padding-bottom:28px;border-bottom:2px solid #f0f0f5}
  .info-block label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.8px;font-weight:600;display:block;margin-bottom:5px}
  .info-block span{font-size:15px;font-weight:500;color:#1a1a2e}

  .row-neg td:last-child{color:#e53e3e}
  .row-total{background:#f8f8fc;border-radius:8px}

  .row-total td:last-child{color:#07070f;font-size:22px}
  .neto-highlight{color:#2d6a2d!important;font-size:24px!important}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .badge-pend{background:#fff3cd;color:#856404}
  .badge-pag{background:#d1fae5;color:#065f46}
  .footer{background:#f8f8fc;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #e8e8f0}
  .footer-left{font-size:12px;color:#aaa}
  .footer-right{font-size:12px;color:#aaa;text-align:right}
  .firma{margin-top:40px;padding-top:20px;border-top:1px dashed #ddd;display:flex;justify-content:space-between}
  .firma-box{text-align:center;width:200px}

  @media print{body{padding:0;background:#fff}.doc{box-shadow:none;border-radius:0}}
</style>
</head>
<body>
<div class="doc">
  <div class="header">
    <div class="logo">InOut<span style="color:#c8ff00">Media</span></div>
    <div class="header-right">
      <div class="doc-title">Recibo de Salario</div>
      <div class="doc-mes">${mes}</div>

      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-left">InOut Media S.L. · CIF: B-XXXXXXXX<br>Documento generado el ${fecha}</div>
    <div class="footer-right">Ejercicio ${anio}<br>Confidencial</div>
  </div>
</div>
</body></html>`;

  const blob = new Blob([html], {type:"text/html"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `nomina_${nombre.replace(/ /g,"_")}_${mes.replace(/ /g,"_")}.html`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Nómina descargada ✓");
}


</script>
</body>
</html>
