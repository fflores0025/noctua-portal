<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>InOut Media · Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#07070f; --surf:#0d0d1a; --card:#111120; --border:#1c1c2e;
      --a1:#c8ff00; --a2:#ff3cac; --a3:#00d4ff;
      --txt:#e6e6f0; --muted:#60607a; --r:13px; --sidebar:240px;
    }
    html,body { height:100%; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--txt); background:var(--bg); overflow-x:hidden; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    #app { display:flex; min-height:100vh; }
    .sidebar { width:var(--sidebar); height:100vh; background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:200; transition:transform .25s cubic-bezier(.4,0,.2,1); overflow:hidden; }
    .main-area { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { height:56px; background:var(--surf); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; position:sticky; top:0; z-index:100; }
    @media(max-width:480px){ .topbar{height:52px;padding:0 12px;} }
    .main-content { flex:1; padding:28px 24px; max-width:1100px; width:100%; margin:0 auto; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:150; }
    .overlay.show { display:block; }
    .s-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-weight:800; font-size:19px; letter-spacing:-.5px; display:flex; align-items:center; justify-content:space-between; }
    .s-logo-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; line-height:1; }
    .s-logo-close:hover { color:var(--txt); }
    .logo-dot { color:var(--a1); }
    .s-user { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; transition:background .15s; }
    .s-user:hover { background:rgba(255,255,255,.04); }
    .s-user-arrow { margin-left:auto; color:var(--muted); font-size:14px; transition:all .2s; }
    .s-user:hover .s-user-arrow { color:var(--a1); transform:translateX(2px); }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--a1); color:#000; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; flex-shrink:0; }
    .av-pink{background:var(--a2);color:#fff;} .av-blue{background:var(--a3);color:#000;} .av-gray{background:var(--muted);color:#fff;}
    .u-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .u-role { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .nav { flex:1; padding:8px 0; overflow-y:auto; min-height:0; }
    .nav-sec { padding:10px 20px 4px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; cursor:pointer; color:var(--muted); transition:all .15s; font-size:13px; border-left:2px solid transparent; user-select:none; }
    .nav-item:hover { color:var(--txt); background:rgba(255,255,255,.03); }
    .nav-item.active { color:var(--a1); border-left-color:var(--a1); background:rgba(200,255,0,.05); }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .nav-badge { background:var(--a2); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; margin-left:auto; line-height:1.4; }
    .s-bottom { padding:14px 20px; border-top:1px solid var(--border); flex-shrink:0; }
    .btn-logout { width:100%; padding:9px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all .15s; }
    .btn-logout:hover { border-color:var(--a2); color:var(--a2); }
    .burger { background:none; border:none; color:var(--txt); font-size:20px; cursor:pointer; padding:4px; display:none; }
    .topbar-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .notif-btn { width:34px; height:34px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; transition:border-color .15s; }
    .notif-btn:hover { border-color:var(--a1); }
    .page-hd { margin-bottom:24px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .page-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; letter-spacing:-.5px; }
    .page-sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:20px; }
    .card-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:14px; }
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;} .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;} .g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .mb16{margin-bottom:16px;} .mb24{margin-bottom:24px;} .flex{display:flex;} .items-c{align-items:center;} .j-between{justify-content:space-between;}
    .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; }
    .stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .stat-val { font-family:'Syne',sans-serif; font-size:26px; font-weight:700; letter-spacing:-1px; }
    .stat-note { font-size:12px; color:var(--muted); margin-top:4px; }
    .c-a1{color:var(--a1);} .c-a2{color:var(--a2);} .c-a3{color:var(--a3);}
    .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
    .b-green{background:rgba(200,255,0,.12);color:var(--a1);} .b-pink{background:rgba(255,60,172,.12);color:var(--a2);} .b-blue{background:rgba(0,212,255,.12);color:var(--a3);} .b-gray{background:rgba(107,107,136,.15);color:var(--muted);} .b-orange{background:rgba(255,165,0,.12);color:#ffa500;}
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;}
    .tbl-wrap::-webkit-scrollbar{height:3px;}
    .tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:rgba(255,255,255,.02);}
    .prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:2px;background:var(--a1);}
    .prog-fill.blue{background:var(--a3);}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
    .btn-p{background:var(--a1);color:#000;} .btn-p:hover{background:#d4ff20;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);} .btn-g:hover{color:var(--txt);border-color:var(--muted);}
    .btn-danger{background:rgba(255,60,172,.1);color:var(--a2);border:1px solid rgba(255,60,172,.2);}
    .btn-full{width:100%;justify-content:center;}
    .btn-paid{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.25);}
    .btn-paid:hover{background:rgba(0,230,118,.2);}
    .t-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .t-row:last-child{border-bottom:none;}
    .t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .d-evento{background:var(--a2);} .d-oficina{background:var(--a3);} .d-rodaje{background:var(--a1);} .d-libre{background:var(--muted);}
    .t-dia{width:85px;font-size:13px;font-weight:500;flex-shrink:0;}
    .t-hrs{font-size:12px;color:var(--muted);width:115px;flex-shrink:0;}
    .t-lug{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nom-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;}
    .nom-row:last-child{border-bottom:none;}
    .nom-total{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--a1);}
    .irpf-big{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:var(--a1);text-align:center;line-height:1;}
    input[type=range]{width:100%;accent-color:var(--a1);cursor:pointer;height:4px;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
    .cal-hd{text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;background:var(--bg);border:1px solid var(--border);user-select:none;position:relative;}
    .cal-day:hover{border-color:var(--a3);background:rgba(0,212,255,.05);}
    .cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
    .cal-day.today{border-color:var(--a1);color:var(--a1);font-weight:700;}
    .cal-day.selected{background:rgba(200,255,0,.14);border-color:var(--a1);color:var(--a1);}
    .cal-day.has-event::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--a2);}
    .cal-day.has-turno::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--a3);}
    .cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;}
    .day-detail{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-top:16px;animation:fadeIn .2s ease;}
    .day-detail-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--a1);}
    .day-event-item{padding:12px;background:var(--card);border-radius:9px;border:1px solid var(--border);margin-bottom:8px;}
    .day-event-item:last-child{margin-bottom:0;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;}
    .info-row:last-child{border-bottom:none;}
    .info-lbl{color:var(--muted);font-size:13px;}
    .ev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s,transform .2s;cursor:pointer;}
    .ev-card:hover{border-color:rgba(200,255,0,.25);transform:translateY(-2px);}
    .ev-nombre{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin:8px 0 6px;}
    .ev-meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;}
    .proy-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
    .proy-nom{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px;}
    .proy-cli{font-size:12px;color:var(--muted);margin-bottom:14px;}
    .form-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:14px;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--a1);}
    .form-textarea{resize:vertical;min-height:80px;}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px;}
    .modal-bg.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;}
    .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;margin-top:-4px;}
    .modal-close:hover{color:var(--a2);}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 60% 40% at 50% -5%,rgba(200,255,0,.09) 0%,transparent 65%),radial-gradient(ellipse 40% 30% at 85% 85%,rgba(255,60,172,.07) 0%,transparent 55%);}
    .login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;}
    .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;margin-bottom:6px;}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.4;}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:1000;transition:transform .3s;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}
    .chat-container{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px;max-height:700px;}
    .chat-messages{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:4px;min-height:0;}
    .chat-messages::-webkit-scrollbar{width:3px;}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .chat-bubble-wrap{display:flex;gap:8px;padding:4px 0;animation:fadeIn .2s ease;}
    .chat-bubble-wrap.mine{flex-direction:row-reverse;}
    .chat-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;position:relative;}
    .chat-bubble.theirs{background:var(--surf);border:1px solid var(--border);border-top-left-radius:4px;}
    .chat-bubble.mine{background:rgba(200,255,0,.12);border:1px solid rgba(200,255,0,.15);border-top-right-radius:4px;}
    .chat-sender{font-size:11px;font-weight:600;color:var(--a3);margin-bottom:3px;}
    .chat-bubble.mine .chat-sender{color:var(--a1);}
    .chat-meta{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px;}
    .chat-bubble.mine .chat-meta{justify-content:flex-end;}
    .chat-dest{font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.06);}
    .chat-input-bar{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border);margin-top:8px;align-items:flex-end;}
    .chat-input-bar select{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex-shrink:0;max-width:130px;}
    .chat-input-bar select:focus{border-color:var(--a1);}
    .chat-input-bar input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
    .chat-input-bar input:focus{border-color:var(--a1);}
    .chat-input-bar button{padding:10px 18px;border-radius:9px;border:none;background:var(--a1);color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;flex-shrink:0;}
    .chat-input-bar button:hover{background:#d4ff20;}
    .chat-date-sep{text-align:center;padding:12px 0 6px;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;}
    @media(max-width:768px){
      :root{--sidebar:100vw;}
      .sidebar{width:100vw;transform:translateX(-100%);position:fixed;top:0;left:0;height:100vh;z-index:300;overflow-y:auto;display:flex;flex-direction:column;}
      .sidebar.open{transform:translateX(0);box-shadow:none;}
      .main-area{margin-left:0;}
      .burger{display:flex!important;}
      .main-content{padding:16px 12px;}
      .g4{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr;} .g2{grid-template-columns:1fr;}
      .g-auto{grid-template-columns:1fr;}
      .page-title{font-size:20px;} .irpf-big{font-size:40px;} .nom-total{font-size:20px;}
      .page-hd{margin-bottom:16px;flex-wrap:wrap;gap:10px;}
      .page-hd .btn{width:100%;justify-content:center;}
      .card{padding:16px;}
      .stat{padding:14px;}
      .stat-val{font-size:22px;}
      .btn{padding:10px 14px;font-size:14px;}
      .modal{padding:20px;}
      .tbl-wrap{border-radius:8px;}
      thead th{font-size:10px;padding:6px 8px;}
      tbody td{padding:10px 8px;font-size:12px;}
      .t-dia{width:70px;font-size:12px;}
      .t-hrs{width:90px;font-size:11px;}
      .cal-day{font-size:12px;border-radius:7px;}
      .cal-hd{font-size:10px;padding:4px 2px;}
      .ev-nombre{font-size:13px;}
      .nav-item{padding:14px 20px;font-size:15px;}
      .nav-icon{font-size:18px;}
      .s-logo{padding:24px 20px 18px;font-size:22px;}
      .s-user{padding:18px 20px;}
      .u-name{font-size:15px;}
      .nav-sec{font-size:11px;padding:14px 20px 6px;}
      .chat-container{height:calc(100vh - 160px);}
      .chat-bubble{max-width:85%;}
      .chat-input-bar{flex-wrap:wrap;}
      .chat-input-bar select{max-width:100%;width:100%;order:1;}
      .chat-input-bar input{order:2;min-width:0;}
      .chat-input-bar button{order:3;}
    }
    @media(max-width:480px){
      .g4{grid-template-columns:1fr 1fr;}
      .g3{grid-template-columns:1fr;}
      .topbar-title{font-size:14px;}
      .main-content{padding:12px 10px;}
      .page-title{font-size:18px;}
      .card{padding:14px;}
      .stat-val{font-size:20px;}
      .modal{max-height:92vh;padding:18px;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;width:100%;max-width:100%;}
      .modal-bg.show{align-items:flex-end;padding:0;}
      .page-hd{flex-direction:column;align-items:stretch;}
      .page-hd .btn{width:100%;justify-content:center;padding:12px;font-size:14px;}
    }
    @media(orientation:landscape) and (max-width:900px){
      :root{--sidebar:260px;}
      .sidebar{width:260px;transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 40px rgba(0,0,0,.85);}
      .main-area{margin-left:0;}
      .g4{grid-template-columns:repeat(4,1fr);}
      .main-content{padding:14px 16px;}
    }
    @media(hover:none){
      .nav-item:hover{background:transparent;color:var(--muted);}
      .nav-item.active:hover{background:rgba(200,255,0,.05);color:var(--a1);}
      .btn:active{opacity:.8;transform:scale(.97);}
      .ev-card:hover{transform:none;}
      .cal-day:active{background:rgba(0,212,255,.1);border-color:var(--a3);}
    }
  </style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div id="panel-login">

function setLoginError(msg){const el=document.getElementById("login-error");el.textContent=msg;el.style.display=msg?"block":"none";}
function setLoginLoading(on){document.getElementById("login-btn").disabled=on;document.getElementById("login-btn").textContent=on?"Entrando…":"Entrar al portal";}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim();
  const pass=document.getElementById("login-pass").value;
  setLoginError("");
  if(!email||!pass){setLoginError("Introduce email y contraseña.");return;}
  setLoginLoading(true);
  try{
    const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    currentUser=data.user;
    const{data:perfil,error:perfilErr}=await _sb.from('empleados').select('*').eq('auth_user_id',currentUser.id).single();
    if(perfilErr||!perfil){setLoginError("Perfil no encontrado. Contacta con el administrador.");await _sb.auth.signOut();setLoginLoading(false);return;}
    const{data:lastChange}=await _sb.from('password_history').select('created_at').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(1).single();
    let diasDesde=0;
    if(lastChange){diasDesde=Math.floor((Date.now()-new Date(lastChange.created_at).getTime())/(1000*60*60*24));}
    else{const hashActual=await hashPassword(pass);await _sb.from('password_history').insert({user_id:currentUser.id,password_hash:hashActual});diasDesde=0;}
    if(diasDesde>=60){setLoginLoading(false);mostrarForzarCambioPass();return;}
    if(diasDesde>=55)toast(`⚠️ Tu contraseña caduca en ${60-diasDesde} días`,5000);
    userProfile={nombre:perfil.nombre,role:perfil.role,dept:perfil.departamento||"—",email:perfil.email,irpf:parseFloat(perfil.irpf)||15,salarioBase:parseFloat(perfil.salario_base)||0,tipo:perfil.tipo||"fijo",tlf:perfil.telefono||"—",fechaAlta:perfil.fecha_alta||"—",estado:perfil.estado||"activo",_supabase_id:perfil.id};
    enterApp();
  }catch(e){
    setLoginLoading(false);
    const msgs={"Invalid login credentials":"Email o contraseña incorrectos.","Email not confirmed":"Confirma tu email primero."};
    setLoginError(msgs[e.message]||"Error al iniciar sesión: "+e.message);
  }
}

  document.getElementById("topbar-title").textContent=PAGE_TITLE[page]||page;

async function doChangePassword(){
  const np=document.getElementById("cp-new").value,cp=document.getElementById("cp-confirm").value;
  if(np!==cp){toast("⚠️ Las contraseñas no coinciden");return;}
  if(np.length<6){toast("⚠️ Mínimo 6 caracteres");return;}
  const{error}=await _sb.auth.updateUser({password:np});
  if(error){toast("Error: "+error.message);return;}
  toast("Contraseña actualizada ✓");closeModal();
}

      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>k===''?`<div></div>`:`<div onclick="pinKeyChange('${k}')" style="padding:16px;border-radius:12px;background:var(--bg);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;text-align:center;cursor:pointer;user-select:none">${k}</div>`).join('')}

    <button class="btn btn-g btn-full" style="margin-top:14px" onclick="closeModal()">Cancelar</button>`);
  window._pinChangeBuf='';
}

function pinKeyChange(k){
  if(!window._pinChangeBuf) window._pinChangeBuf='';
  if(k==='⌫'){ window._pinChangeBuf=window._pinChangeBuf.slice(0,-1); }
  else if(window._pinChangeBuf.length<4){ window._pinChangeBuf+=k; }
  for(let i=0;i<4;i++){
    const d=document.getElementById('cpd'+i);
    if(d){ d.style.background=i<window._pinChangeBuf.length?'var(--a1)':'transparent'; d.style.borderColor=i<window._pinChangeBuf.length?'var(--a1)':'var(--border)'; }
  }
  if(window._pinChangeBuf.length===4){
    setTimeout(()=>guardarNuevoPIN(window._pinChangeBuf),150);
    window._pinChangeBuf='';
  }
}

async function guardarNuevoPIN(pin){
  const{error}=await _sb.from('empleados').update({staff_pin:pin}).eq('id',userProfile._supabase_id);
  if(error){toast("Error: "+error.message);return;}
  userProfile.staff_pin=pin;
  toast("PIN de fichaje actualizado ✓");closeModal();
}

async function marcarNominaPagada(id){
  const btn=event.target;
  btn.disabled=true;btn.textContent="Guardando…";
  const{error}=await _sb.from('nominas').update({estado:'pagada'}).eq('id',id);
  if(error){toast("Error: "+error.message);btn.disabled=false;btn.textContent="✓ Marcar como pagada";return;}
  // Actualizar en memoria
  const idx=DEMO_NOMINAS.findIndex(n=>n.id===id);
  if(idx>-1) DEMO_NOMINAS[idx].estado='pagada';
  toast("Nómina marcada como pagada ✓");
  // Refrescar: re-renderizar la página actual
  if(currentPage==="admin-nominas") renderAdminNominas(document.getElementById("page-content"));
  else renderNominas(document.getElementById("page-content"));
}

// ── CALENDARIO ───────────────────────────────────────────────────────────
function renderCalendario(pc){
  const dias=["L","M","X","J","V","S","D"];
  const ahora=new Date();const calYear=ahora.getFullYear();const calMonth=ahora.getMonth();
  const primerDia=new Date(calYear,calMonth,1);const ultimoDia=new Date(calYear,calMonth+1,0).getDate();
  const offset=(primerDia.getDay()+6)%7;
  const all=[];for(let i=0;i<offset;i++)all.push(null);for(let d=1;d<=ultimoDia;d++)all.push(d);while(all.length%7!==0)all.push(null);
  const mesStr=String(calMonth+1).padStart(2,"0");
  const eventDays=new Set(DEMO_EVENTOS.map(e=>{const m=e.fecha.match(new RegExp(`${calYear}-${mesStr}-(\\d{2})`));return m?parseInt(m[1]):null;}).filter(Boolean));
  const turnoDias={};DEMO_TURNOS.forEach(t=>{const m=t.fecha&&t.fecha.match(new RegExp(`${calYear}-${mesStr}-(\\d{2})`));if(m)turnoDias[parseInt(m[1])]=t.tipo;});
  const dotColor={evento:"var(--a2)",rodaje:"var(--a1)",oficina:"var(--a3)",libre:"var(--muted)"};
  const mesesNombres=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  pc.innerHTML=`
    <div class="page-hd"><div class="flex items-c j-between" style="width:100%;flex-wrap:wrap;gap:8px"><div><div class="page-title">Calendario Laboral</div><div class="page-sub">${mesesNombres[calMonth]} ${calYear}</div></div><div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)">${Object.entries(dotColor).map(([k,v])=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${v};display:inline-block"></span>${k}</span>`).join("")}</div></div></div>
    <div class="card mb16"><div class="cal-grid">${dias.map(d=>`<div class="cal-hd">${d}</div>`).join("")}${all.map(n=>{if(!n)return`<div class="cal-day empty"></div>`;const hoyD=new Date();const isToday=(n===hoyD.getDate()&&calMonth===hoyD.getMonth()&&calYear===hoyD.getFullYear());const hasEv=eventDays.has(n);const tipoTurno=turnoDias[n];return`<div class="cal-day ${isToday?"today":""} ${hasEv?"has-event":tipoTurno?"has-turno":""}" id="cal-day-${n}" onclick="selectDay(${n})">${n}${tipoTurno?`<div class="cal-dot" style="background:${dotColor[tipoTurno]}"></div>`:""}</div>`;}).join("")}</div></div>
    <div id="day-detail-area"></div>
    <div class="card"><div class="card-title">Tus turnos próximos</div>${DEMO_TURNOS.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">No tienes turnos asignados aún</div>`:DEMO_TURNOS.slice(0,7).map(t=>{const d=new Date(t.fecha+"T12:00:00");const ds=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];const ms=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return`<div class="t-row"><span class="t-dia">${ds[d.getDay()]} ${d.getDate()} ${ms[d.getMonth()]}</span><span class="t-dot d-${t.tipo}"></span><span class="t-hrs">${t.tipo==="libre"?"Libre":`${t.entrada}–${t.salida}`}</span><span class="t-lug">${t.lugar||"—"}</span></div>`;}).join("")}</div>`;
}
function selectDay(n){
  document.querySelectorAll(".cal-day.selected").forEach(el=>el.classList.remove("selected"));
  document.getElementById(`cal-day-${n}`)?.classList.add("selected");
  const ahora2=new Date();const cY=ahora2.getFullYear(),cM=ahora2.getMonth()+1;

  const evs=DEMO_EVENTOS.filter(e=>e.fecha===fechaDia);const turno=DEMO_TURNOS.find(t=>t.fecha===fechaDia);
  const area=document.getElementById("day-detail-area");
  const mesesN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  if(turno)html+=`<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Tu turno</div><div class="day-event-item" style="display:flex;align-items:center;gap:10px"><span class="t-dot d-${turno.tipo}" style="width:9px;height:9px"></span><div><div style="font-weight:500">${turno.tipo==="libre"?"Día libre":turno.lugar}</div><div style="font-size:12px;color:var(--muted)">${turno.entrada==="—"?"Sin horario":`${turno.entrada} – ${turno.salida}`}</div></div></div></div>`;
  if(evs.length>0)html+=`<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Eventos del día</div>${evs.map(ev=>`<div class="day-event-item" style="cursor:pointer" onclick="verEvento('${ev.id}')"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-family:Syne,sans-serif;font-weight:600;font-size:14px">${ev.nombre}</span>${badge(ev.estado)}</div><div style="font-size:12px;color:var(--muted)">📍 ${ev.lugar}</div></div>`).join("")}</div>`;
  if(!turno&&evs.length===0)html+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">Sin actividad registrada</div>`;
  html+=`</div>`;area.innerHTML=html;area.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// Sincroniza stock disponible cuando se cambia el stock total (solo si el disp estaba igual)
function syncStockDisp(input, i){
  const row=document.getElementById(`tt-row-${i}`);if(!row)return;
  const dispInput=row.querySelector('.tt-stock-disp');
  if(!dispInput||dispInput.dataset.edited) return;
  dispInput.value=input.value;
}

function getTicketTypes(){
  const rows=document.querySelectorAll("#ticket-types-list [id^='tt-row-']");const types=[];
  rows.forEach(row=>{
    const nombre=row.querySelector(".tt-nombre").value.trim();
    if(!nombre) return;
    const zona=row.querySelector(".tt-zona").value;
    const precio=parseFloat(row.querySelector(".tt-precio").value)||0;
    const stock=parseInt(row.querySelector(".tt-stock").value)||0;
    const stockDisp=parseInt(row.querySelector(".tt-stock-disp").value);
    const max=parseInt(row.querySelector(".tt-max").value)||4;
    const activoVal=row.querySelector(".tt-activo").value;
    types.push({nombre,zona,precio,stock_total:stock,stock_disponible:isNaN(stockDisp)?stock:stockDisp,max_por_persona:max,activo:activoVal==='activo'});
  });
  return types;
}

function toSlug(text){return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

    _sb.from('ticket_types').select('*').eq('event_id',eventId).order('nombre'),

  showModal(`

          ${otrosEventos.map(e=>`<option value="${e.id}">${e.nombre} (${(e.fecha_inicio||'').slice(0,10)})</option>`).join('')}
        </select>
        <button class="btn btn-sup" style="flex-shrink:0;padding:8px 14px;font-size:13px" onclick="copiarProductosDeEvento('${eventId}')">Copiar</button>
      </div>
    </div>

    <!-- Lista de productos actuales -->
    <div id="prod-list" style="display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto;margin-bottom:14px">
      ${tickets.length===0
        ? '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Sin productos. Añade uno abajo o copia de otro evento.</div>'
        : tickets.map(t=>productoCard(t)).join('')}
    </div>

    <!-- Añadir nuevo producto rápido -->
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">+ Añadir nuevo producto</div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:8px">
        <input class="form-input" id="np-nombre" placeholder="Nombre…" style="margin-bottom:0"/>
        <input class="form-input" id="np-precio" type="number" min="0" step="0.01" placeholder="€ precio" style="margin-bottom:0"/>
        <input class="form-input" id="np-stock" type="number" min="0" placeholder="Stock" style="margin-bottom:0"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select class="form-select" id="np-zona" style="margin-bottom:0">
          ${["general","vip","backstage","pista","grada","palco"].map(z=>`<option value="${z}">${z}</option>`).join('')}
        </select>
        <button class="btn btn-p" onclick="agregarProductoRapido('${eventId}')">+ Añadir</button>
      </div>
    </div>
  `);
}

// Renderiza una tarjeta de producto con controles inline
function productoCard(t){
  const activo=t.activo!==false;
  const dispPct=t.stock_total>0?Math.round((t.stock_disponible/t.stock_total)*100):0;
  const stockColor=t.stock_disponible===0?'var(--danger)':t.stock_disponible<(t.stock_total*0.2)?'#ffab00':'var(--a1)';
  return `<div id="prod-card-${t.id}" style="background:var(--bg);border:1px solid ${activo?'var(--border)':'rgba(255,23,68,.2)'};border-radius:9px;padding:12px;opacity:${activo?1:.75}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-weight:600;font-size:14px">${t.nombre}</div>
        <div style="font-size:11px;color:var(--muted)">${t.tipo_zona||t.zona||'general'} · ${parseFloat(t.precio||0).toFixed(2)}€</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <select onchange="cambiarEstadoProducto('${t.id}',this.value,'${t.event_id}')" style="padding:5px 8px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:12px;cursor:pointer">
          <option value="activo" ${activo?'selected':''}>✅ Activo</option>
          <option value="inactivo" ${!activo?'selected':''}>⛔ Inactivo</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Stock disponible / total</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" min="0" max="${t.stock_total}" value="${t.stock_disponible}" 
            style="width:60px;padding:5px 8px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:${stockColor};font-weight:700;font-size:14px;text-align:center"
            onchange="actualizarStockProducto('${t.id}',this.value,'${t.event_id}')"/>
          <span style="color:var(--muted);font-size:12px">/ ${t.stock_total}</span>
        </div>
        <div style="margin-top:6px;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
          <div style="width:${dispPct}%;height:100%;background:${stockColor};border-radius:2px;transition:width .3s"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Vendidos</div>
        <div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:var(--a2)">${(t.stock_total||0)-(t.stock_disponible||0)}</div>
      </div>
    </div>
  </div>`;
}

// Cambiar estado activo/inactivo de un producto desde la pantalla de gestión
async function cambiarEstadoProducto(ticketTypeId, nuevoEstado, eventId){
  const activo=nuevoEstado==='activo';
  const{error}=await _sb.from('ticket_types').update({activo}).eq('id',ticketTypeId);
  if(error){toast('Error: '+error.message);return;}
  toast(activo?'Producto activado ✓':'Producto desactivado ✓');
  gestionarProductosEvento(eventId);
}

// Actualizar stock disponible inline
async function actualizarStockProducto(ticketTypeId, nuevoStock, eventId){
  const v=parseInt(nuevoStock);if(isNaN(v)||v<0)return;
  const{error}=await _sb.from('ticket_types').update({stock_disponible:v}).eq('id',ticketTypeId);
  if(error){toast('Error stock: '+error.message);return;}
  toast('Stock actualizado ✓');
  // Refrescar solo la card sin cerrar modal
  const{data:t}=await _sb.from('ticket_types').select('*').eq('id',ticketTypeId).single();
  if(t){const card=document.getElementById(`prod-card-${ticketTypeId}`);if(card)card.outerHTML=productoCard(t);}
}

// Copiar productos de otro evento a este
async function copiarProductosDeEvento(targetEventId){
  const sourceId=document.getElementById('copy-from-event').value;
  if(!sourceId){toast('Selecciona un evento origen','warn');return;}
  const{data:sourceTTs}=await _sb.from('ticket_types').select('*').eq('event_id',sourceId);
  if(!sourceTTs||sourceTTs.length===0){toast('Ese evento no tiene productos','warn');return;}
  const nuevos=sourceTTs.map(t=>({
    event_id:targetEventId,
    nombre:t.nombre,
    tipo_zona:t.tipo_zona,
    precio:t.precio,
    stock_total:t.stock_total,
    stock_disponible:t.stock_total, // resetear disponible al total
    max_por_persona:t.max_por_persona,
    activo:t.activo
  }));
  const{error}=await _sb.from('ticket_types').insert(nuevos);
  if(error){toast('Error al copiar: '+error.message);return;}
  toast(`${nuevos.length} productos copiados ✓`);
  gestionarProductosEvento(targetEventId);
}

// Añadir producto rápido desde el panel de gestión
async function agregarProductoRapido(eventId){
  const nombre=document.getElementById('np-nombre').value.trim();
  if(!nombre){toast('Escribe un nombre','warn');return;}
  const precio=parseFloat(document.getElementById('np-precio').value)||0;
  const stock=parseInt(document.getElementById('np-stock').value)||0;
  const zona=document.getElementById('np-zona').value;
  const{error}=await _sb.from('ticket_types').insert({event_id:eventId,nombre,tipo_zona:zona,precio,stock_total:stock,stock_disponible:stock,max_por_persona:4,activo:true});
  if(error){toast('Error: '+error.message);return;}
  toast(`"${nombre}" añadido ✓`);
  gestionarProductosEvento(eventId);
}

async function guardarEvento(){
  const nombre=document.getElementById("ev-nombre").value.trim();if(!nombre){toast("⚠️ El nombre es obligatorio");return;}
  const fecha=document.getElementById("ev-fecha").value||new Date().toISOString().slice(0,10);

  const lugar=document.getElementById("ev-lugar").value||"Por confirmar";const lugarParts=lugar.split(",");const venue_nombre=lugarParts[0]?.trim()||"Por confirmar";const venue_ciudad=lugarParts[1]?.trim()||"Madrid";
  const ticketTypes=getTicketTypes();const aforo_total=ticketTypes.reduce((sum,t)=>sum+(t.stock_total||0),0);
  const slug=toSlug(nombre)+"-"+Date.now();

  function formatDateForInput(dateStr) {
  if (!dateStr) return '';
  if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) return dateStr;
  if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
    const [day, month, year] = dateStr.split('/');
    return `${year}-${month}-${day}`;
  }
  try {
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return '';
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  } catch (e) {
    return '';
  }
}

async function actualizarEvento(id){
  console.log('Actualizando evento ID:', id); // debug
  const nombre = document.getElementById("ee-nombre")?.value?.trim();
  if(!nombre){toast("⚠️ El nombre es obligatorio");return;}
  
  const lugar=document.getElementById("ee-lugar")?.value||"";
  const lugarParts=lugar.split(",");
  const venue_nombre=lugarParts[0]?.trim()||"";
  const venue_ciudad=lugarParts[1]?.trim()||"Madrid";
  const fecha=document.getElementById("ee-fecha")?.value||"";
  const horaInicio=document.getElementById("ee-hora-inicio")?.value||"22:00";
  const fechaFin=document.getElementById("ee-fecha-fin")?.value||"";
  const horaFin=document.getElementById("ee-hora-fin")?.value||"06:00";
  
  console.log('Fechas:', fecha, fechaFin); // debug
  
  const ticketTypes=getTicketTypes();
  const aforo_total=ticketTypes.reduce((sum,t)=>sum+(t.stock_total||0),0);
  
  const updateData = {
    nombre,
    venue_nombre,
    venue_ciudad,
    aforo_total,
    estado: document.getElementById("ee-estado")?.value||"borrador",
    notas: document.getElementById("ee-notas")?.value||null,
    artistas: document.getElementById("ee-artistas")?.value||null,
    vestimenta: document.getElementById("ee-vestimenta")?.value||null,
    apertura_puertas: document.getElementById("ee-apertura")?.value||null,
    edad_minima: parseInt(document.getElementById("ee-edad")?.value)||null,
    normas: document.getElementById("ee-normas")?.value||null,
    descripcion: document.getElementById("ee-descripcion")?.value||null,
    maps_url: document.getElementById("ee-maps")?.value||null,
    web_evento: document.getElementById("ee-web")?.value||null,
  };
  
  if(fecha) updateData.fecha_inicio = `${fecha}T${horaInicio}:00`;
  if(fechaFin) updateData.fecha_fin = `${fechaFin}T${horaFin}:00`;
  
  const{error}=await _sb.from('events').update(updateData).eq('id',id);
  if(error){toast("Error: "+error.message);console.error('Error Supabase:', error);return;}
  
  try{
    await _sb.from('ticket_types').delete().eq('event_id',id);
    if(ticketTypes.length>0){
      await _sb.from('ticket_types').insert(ticketTypes.map(t=>({
        event_id:id,
        nombre:t.nombre,
        tipo_zona:t.zona||'general',
        precio:t.precio,
        stock_total:t.stock_total,
        stock_disponible:t.stock_disponible,
        max_por_persona:t.max_por_persona,
        activo:t.activo!==false
      })));
    }
  }catch(e2){console.warn('Ticket types error:',e2);}
  
  toast("Evento actualizado ✓");
  _ticketRowCount=0;
  closeModal();
  await cargarEventos();
  if(currentPage==="eventos") renderEventos(document.getElementById("page-content"));
  if(currentPage==="calendario") renderCalendario(document.getElementById("page-content"));
}

async function cargarContactosChat(){
  try{
    const{data:empleados}=await _sb.from("empleados").select("nombre,role").eq("estado","activo");
    const{data:mensajes}=await _sb.from("mensajes").select("de,para,mensaje,created_at").order("created_at",{ascending:false}).limit(200);
    if(!empleados) return;

    // Construir lista de contactos con último mensaje
    const contactMap={};
    // Canal general siempre primero
    contactMap['todos']={nombre:'Canal general',icon:'📢',lastMsg:'',lastTime:'',unread:0,isGroup:true};

    empleados.forEach(e=>{
      if(e.nombre!==userProfile.nombre){
        contactMap[e.nombre]={nombre:e.nombre,icon:initials(e.nombre),lastMsg:'',lastTime:'',unread:0,isGroup:false};
      }
    });

    // Rellenar último mensaje por contacto
    (mensajes||[]).forEach(m=>{
      // Mensaje en canal general
      if(m.para==='todos'){
        if(!contactMap['todos'].lastMsg){ contactMap['todos'].lastMsg=m.mensaje; contactMap['todos'].lastTime=m.created_at; }
      }
      // Mensaje privado: rellenar el contacto correspondiente
      const partner = m.de===userProfile.nombre ? m.para : m.de;
      if(partner!=='todos' && contactMap[partner]){
        if(!contactMap[partner].lastMsg){ contactMap[partner].lastMsg=m.mensaje; contactMap[partner].lastTime=m.created_at; }
      }
    });

    _chatContacts = Object.values(contactMap);
    renderContactList();
  }catch(e){ console.error('cargarContactosChat',e); }
}

function renderContactList(){
  const el=document.getElementById('contact-list'); if(!el) return;
  el.innerHTML=_chatContacts.map(c=>{
    const isActive=_activeChat===c.nombre||(c.isGroup&&_activeChat==='todos');
    const timeStr=c.lastTime?new Date(c.lastTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'';
    return`<div onclick="selectChat('${c.isGroup?'todos':c.nombre}','${c.nombre.replace(/'/g,"\\'")}',${c.isGroup})"
      style="padding:10px 14px;cursor:pointer;transition:background .12s;border-left:3px solid ${isActive?'var(--a1)':'transparent'};background:${isActive?'rgba(200,255,0,.06)':'transparent'}">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar ${c.isGroup?'':'av-blue'}" style="width:32px;height:32px;font-size:${c.isGroup?'16':'11'}px;flex-shrink:0">${c.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;font-weight:${isActive?'600':'400'};color:${isActive?'var(--a1)':'var(--txt)'}; white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px">${c.nombre}</div>
            <div style="font-size:10px;color:var(--muted)">${timeStr}</div>
          </div>
          <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${c.lastMsg||'Sin mensajes'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectChat(chatKey, displayName, isGroup){
  _activeChat=chatKey;
  renderContactList();
  // Actualizar header
  const headerName=document.getElementById('chat-header-name');
  const headerSub=document.getElementById('chat-header-sub');
  const headerAvatar=document.getElementById('chat-header-avatar');
  if(headerName) headerName.textContent=displayName;
  if(headerSub) headerSub.textContent=isGroup?'Todos los miembros del equipo':`Chat privado con ${displayName}`;
  if(headerAvatar){ headerAvatar.textContent=isGroup?'📢':initials(displayName); }
  cargarMensajes();
}

async function enviarMensaje(){
  const input=document.getElementById("msg-texto");
  const texto=input?.value?.trim();
  if(!texto) return;
  input.value=""; input.focus();
  try{
    await _sb.from("mensajes").insert({de:userProfile.nombre,para:_activeChat,mensaje:texto});
    // Notificación push si tiene permiso
    enviarNotificacionPush(`💬 ${userProfile.nombre}`,texto,_activeChat);
  }catch(e){toast("Error al enviar mensaje");}
}

async function cargarMensajes(){
  try{
    let query=_sb.from("mensajes").select("*").order("created_at",{ascending:true});
    if(_activeChat==='todos'){
      query=query.eq('para','todos');
    } else {
      // Mensajes privados entre los dos usuarios
      query=query.or(`and(de.eq.${userProfile.nombre},para.eq.${_activeChat}),and(de.eq.${_activeChat},para.eq.${userProfile.nombre})`);
    }
    const{data}=await query.limit(100);
    pintarMensajes(data||[]);
  }catch(e){ console.error('cargarMensajes',e); }
}

function pintarMensajes(lista){
  const box=document.getElementById("chat-box"); if(!box) return;
  if(!lista.length){
    box.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">💬</div><div style="font-size:13px">Sin mensajes aún</div></div>`;
    return;
  }
  let html="",lastDate="";
  lista.forEach(m=>{
    const isMine=m.de===userProfile.nombre;
    const date=new Date(m.created_at);
    const dateStr=date.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
    const timeStr=date.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
    if(dateStr!==lastDate){html+=`<div class="chat-date-sep">${dateStr}</div>`;lastDate=dateStr;}
    html+=`<div class="chat-bubble-wrap ${isMine?"mine":""}">
      <div class="avatar" style="width:26px;height:26px;font-size:10px;flex-shrink:0;align-self:flex-end">${initials(m.de)}</div>
      <div class="chat-bubble ${isMine?"mine":"theirs"}">
        ${!isMine&&_activeChat==='todos'?`<div class="chat-sender">${m.de}</div>`:''}
        <div>${m.mensaje.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        <div class="chat-meta"><span>${timeStr}</span></div>
      </div>
    </div>`;
  });
  box.innerHTML=html; box.scrollTop=box.scrollHeight;
}

// ── NOTIFICACIONES PUSH ───────────────────────────────────────────────────
async function solicitarNotificaciones(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm==='granted') toast('🔔 Notificaciones activadas');
  }
}

function enviarNotificacionPush(titulo, cuerpo, para){
  // Solo notificar si el mensaje es para mí y no estoy viendo ese chat
  if(para!=='todos' && para!==userProfile.nombre) return;
  if(Notification.permission!=='granted') return;
  if(document.visibilityState==='visible' && currentPage==='mensajes') return;
  new Notification(titulo,{
    body: cuerpo.substring(0,80),
    icon: '/favicon.ico',
    badge: '/favicon.ico',
    tag: 'inout-msg',
    renotify: true,
  });
}

let chatActivo=false;
function activarRealtime(){
  if(chatActivo)return; chatActivo=true;
  _sb.channel('mensajes-realtime').on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes'},(payload)=>{
    const msg=payload.new;
    const esPaMi=msg.para==='todos'||(msg.para===userProfile.nombre)||(msg.de===userProfile.nombre);
    if(!esPaMi) return;
    if(currentPage==="mensajes"){
      // Refrescar si estamos en el chat correcto
      const esElChat=msg.para==='todos'?_activeChat==='todos':
        (msg.de===_activeChat||msg.para===_activeChat);
      if(esElChat) cargarMensajes();
      cargarContactosChat(); // actualizar last message en sidebar
    } else {
      if(msg.de!==userProfile.nombre){
        unreadMsgCount++;
        const navItem=document.getElementById("nav-mensajes");
        const existingBadge=document.getElementById("nav-badge-msg");
        if(existingBadge) existingBadge.textContent=unreadMsgCount;
        else if(navItem) navItem.insertAdjacentHTML("beforeend",`<span class="nav-badge" id="nav-badge-msg">${unreadMsgCount}</span>`);
        toast(`💬 ${msg.de}: ${msg.mensaje.substring(0,40)}${msg.mensaje.length>40?"…":""}`);
        enviarNotificacionPush(`💬 ${msg.de}`,msg.mensaje,msg.para);
      }
    }
  }).subscribe();
}

  try{
    const res=await fetch("/api/create-employee",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      email,nombre,
      departamento:document.getElementById("emp-dept").value,
      role:document.getElementById("emp-role").value,

      staff_pin:pin||null,

      horas_contrato:horas,

    const data=await res.json();
    if(res.ok) toast(`✅ "${nombre}" creado. Email de acceso enviado.`);
    else toast("Error: "+(data.error||"desconocido"));
  }catch(e){toast("Error: "+e.message);}
  closeModal();await cargarEmpleados();renderAdmin(document.getElementById("page-content"));
}

async function actualizarEmpleado(id){
  const pin=document.getElementById("ee-pin")?.value||"";
  if(pin&&(pin.length!==4||!/^\d{4}$/.test(pin))){toast("⚠️ El PIN debe ser de 4 dígitos");return;}
  const updateData={
    nombre:document.getElementById("ee-nombre").value.trim(),
    email:document.getElementById("ee-email").value.trim(),
    telefono:document.getElementById("ee-tlf").value,
    tipo:document.getElementById("ee-tipo").value,
    role:document.getElementById("ee-role").value,
    departamento:document.getElementById("ee-dept").value,
    salario_base:parseInt(document.getElementById("ee-salario").value)||0,
    irpf:parseInt(document.getElementById("ee-irpf").value)||15,
    estado:document.getElementById("ee-status").value,
    numero_empleado:document.getElementById("ee-numero")?.value||null,
    horas_contrato:parseInt(document.getElementById("ee-horas")?.value)||40,
    staff_uid:document.getElementById("ee-uid")?.value||null,
  };
  if(pin) updateData.staff_pin=pin;  // solo actualizar PIN si se introdujo uno nuevo
  await _sb.from('empleados').update(updateData).eq('id',id);
  toast("Empleado actualizado ✓");closeModal();await cargarEmpleados();renderAdmin(document.getElementById("page-content"));
}

async function generarNominaEmp(empleadoId,mes){
  const e=DEMO_EMPLEADOS.find(x=>x.id===empleadoId);if(!e||e.salario<=0)return;
  const ss=160,ret=Math.round(e.salario*(e.irpf||15)/100),neto=e.salario-ret-ss;
  await _sb.from('nominas').upsert({empleado_id:empleadoId,empleado_nombre:e.nombre,mes,bruto:e.salario,irpf:e.irpf||15,retencion:ret,ss,neto,estado:'pendiente',generado_por:userProfile.nombre},{onConflict:'empleado_id,mes'});
  toast(`Nómina de ${e.nombre} generada ✓`);renderAdminNominas(document.getElementById("page-content"));
}

async function generarTodasNominas(mes){
  let count=0;
  for(const e of DEMO_EMPLEADOS.filter(x=>x.estado==="activo"&&x.salario>0)){
    const ss=160,ret=Math.round(e.salario*(e.irpf||15)/100),neto=e.salario-ret-ss;
    const{error}=await _sb.from('nominas').upsert({empleado_id:e.id,empleado_nombre:e.nombre,mes,bruto:e.salario,irpf:e.irpf||15,retencion:ret,ss,neto,estado:'pendiente',generado_por:userProfile.nombre},{onConflict:'empleado_id,mes'});
    if(!error)count++;
  }
  toast(`${count} nóminas generadas ✓`);renderAdminNominas(document.getElementById("page-content"));
}

// NUEVA función generarPDFNomina — formato nómina española completa
function generarPDFNomina(n){
  const{jsPDF}=window.jspdf;
  if(!jsPDF){toast("Error: jsPDF no disponible");return;}

  // Datos del empleado
  const nombre   = n.empleadoNombre || userProfile.nombre;
  const dept     = userProfile.dept  || "—";
  const email    = userProfile.email || "—";
  const mes      = n.mes             || "—";
  const bruto    = n.bruto           || userProfile.salarioBase || 0;
  const irpf     = n.irpf            || userProfile.irpf        || 15;
  const ss       = n.ss              || (bruto > 0 ? 160 : 0);
  const ret      = n.retencion       || Math.round(bruto * irpf / 100);
  const neto     = n.neto            || (bruto - ret - ss);
  const esPagada = n.estado          === "pagada";
  const fecha    = new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});
  const anio     = new Date().getFullYear();

  // Calcular conceptos desglosados
  const salBase      = Math.round(bruto * 0.85);      // 85% salario base
  const plusTransp   = Math.round(bruto * 0.04);      // 4% plus transporte
  const pagaExtra    = Math.round(bruto * 0.055);     // paga extra prorrateada
  const primaSeguro  = Math.round(bruto * 0.02);      // prima seguro médico
  const totalDevengo = salBase + plusTransp + pagaExtra + primaSeguro;
  const cotCC        = Math.round(bruto * 0.047);     // contingencias comunes 4.7%
  const cotDesem     = Math.round(bruto * 0.016);     // desempleo 1.6%
  const cotFP        = Math.round(bruto * 0.001);     // formación profesional
  const totalDed     = ret + ss + cotCC + cotDesem + cotFP;
  const liquidoReal  = totalDevengo - totalDed;

  // Período devengado
  const [mesNom, anioNom] = mes.split(" ");
  const mesesNum = {Enero:"01",Febrero:"02",Marzo:"03",Abril:"04",Mayo:"05",Junio:"06",Julio:"07",Agosto:"08",Septiembre:"09",Octubre:"10",Noviembre:"11",Diciembre:"12"};
  const mesNum   = mesesNum[mesNom] || "01";
  const diasMes  = new Date(parseInt(anioNom||anio), parseInt(mesNum), 0).getDate();
  const periodoInicio = `01/${mesNum}/${anioNom||anio}`;
  const periodoFin    = `${diasMes}/${mesNum}/${anioNom||anio}`;
  const fCobro        = `${diasMes}-${mesNum}-${anioNom||anio}`;

  const doc = new jsPDF({unit:"mm", format:"a4"});
  const pw = 210, ph = 297;
  const ml = 10, mr = 200; // márgenes

  // Fuente por defecto
  doc.setFont("helvetica","normal");
  doc.setFontSize(8);

  // ══════════════════════════════════════════════════
  // CABECERA — EMPRESA
  // ══════════════════════════════════════════════════
  const drawCell = (x,y,w,h,text,bold=false,align="left",fontSize=8,fill=null) => {
    if(fill){ doc.setFillColor(...fill); doc.rect(x,y,w,h,"F"); }
    doc.setLineWidth(0.2);
    doc.setDrawColor(180,180,180);
    doc.rect(x,y,w,h,"S");
    doc.setFont("helvetica", bold?"bold":"normal");
    doc.setFontSize(fontSize);
    const tx = align==="center" ? x+w/2 : align==="right" ? x+w-2 : x+2;
    const ty = y + h/2 + fontSize*0.35;
    doc.text(text||"", tx, ty, {align});
    doc.setFont("helvetica","normal");
  };

  let cy = 10;

  // Fila cabecera empresa
  drawCell(ml, cy, 100, 6, "EMPRESA", true, "center", 7, [230,230,230]);
  drawCell(110, cy, 50, 6, "C.I.F.", true, "center", 7, [230,230,230]);
  drawCell(160, cy, 40, 6, "Nº INSC. S.S.", true, "center", 7, [230,230,230]);
  cy += 6;

  // ══════════════════════════════════════════════════

  drawCell(145, cy, 20,  5, "TIPO",                true, "center", 6, [230,230,230]);
  drawCell(165, cy, 35,  5, "APORTACIÓN EMPRESA",  true, "center", 6, [230,230,230]);
  cy += 5;

  const cotEmpresa = [
    ["CONTINGENCIAS COMUNES IMPORTE REMUNERACIÓN MENSUAL", baseCotiz, null, null],
    ["TOTAL",                                              baseCotiz, 24.10, Math.round(baseCotiz*0.241)],
    ["AT Y EP",                                            baseCotiz, 1.65,  Math.round(baseCotiz*0.0165)],
    ["DESEMPLEO",                                          null,      5.50,  Math.round(baseCotiz*0.055)],
    ["FORMACIÓN PROFESIONAL",                              null,      0.60,  Math.round(baseCotiz*0.006)],
    ["FONDO GARANTÍA SALARIAL",                            null,      0.20,  Math.round(baseCotiz*0.002)],
    ["BASE SUJETA A RETENCIÓN DEL IRPF",                  bruto,     null,  null],
  ];

  cotEmpresa.forEach(([conc,base,tipo,apor]) => {

    drawCell(165, cy, 35,  5, apor?apor.toLocaleString("es-ES",{minimumFractionDigits:2}):"", false, "right",  6);
    cy += 5;
  });

  cy += 6;

  // ══════════════════════════════════════════════════
  // FIRMAS + PIE
  // ══════════════════════════════════════════════════
  doc.setDrawColor(180,180,180);
  doc.setLineWidth(0.3);
  doc.line(ml, cy+10, 85, cy+10);

  doc.setTextColor(130,130,130);

}



// ── CERTIFICADO DE RETENCIONES ──────────────────────────────────────────
function generarCertificadoRetenciones(){
  const{jsPDF}=window.jspdf;
  if(!jsPDF){toast("Error: jsPDF no disponible");return;}
  const anio=new Date().getFullYear();
  const nombre=userProfile.nombre, dept=userProfile.dept||"—", email=userProfile.email||"—";
  const bruto=userProfile.salarioBase||0, irpf=userProfile.irpf||15;
  // Calcular totales anuales (estimado a partir de nóminas o salario base × 12)
  const nominasPagadas=DEMO_NOMINAS.filter(n=>n.estado==="pagada");
  const totalBruto=nominasPagadas.length>0
    ? nominasPagadas.reduce((s,n)=>s+(n.bruto||0),0)
    : bruto*12;
  const totalRet=nominasPagadas.length>0
    ? nominasPagadas.reduce((s,n)=>s+(n.retencion||0),0)
    : Math.round(totalBruto*irpf/100);
  const totalSS=nominasPagadas.length>0
    ? nominasPagadas.reduce((s,n)=>s+(n.ss||0),0)
    : 160*12;
  const totalNeto=totalBruto-totalRet-totalSS;
  const fechaEmision=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});

  const doc=new jsPDF({unit:"mm",format:"a4"});
  const pw=210;

  // Cabecera
  doc.setFillColor(7,7,15); doc.rect(0,0,pw,35,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(20);
  doc.text("InOut",14,20);
  doc.setTextColor(200,255,0); doc.text("Media",38,20);
  doc.setTextColor(200,255,0); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("CERTIFICADO DE RETENCIONES",pw-14,16,{align:"right"});
  doc.setTextColor(255,255,255); doc.setFontSize(11);
  doc.text(`Ejercicio ${anio}`,pw-14,24,{align:"right"});

  // Datos empresa y trabajador
  doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont("helvetica","normal");
  let cy=48;
  const drawRow=(lbl,val,bold=false)=>{
    doc.setFont("helvetica","normal"); doc.setTextColor(130,130,130); doc.text(lbl,14,cy);
    doc.setFont("helvetica",bold?"bold":"normal"); doc.setTextColor(30,30,30); doc.text(String(val),90,cy);
    cy+=7;
  };

  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(30,30,30);
  doc.text("DATOS DEL PAGADOR",14,cy); cy+=6;
  doc.setDrawColor(220,220,230); doc.setLineWidth(0.3); doc.line(14,cy,pw-14,cy); cy+=6;
  drawRow("Empresa:","InOut Media S.L.");
  drawRow("CIF:","B-XXXXXXXX");
  drawRow("Domicilio:","Calle —, — · Madrid");
  drawRow("Nº Inscripción SS:","28 XXXXXXXXX");
  cy+=4;

  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(30,30,30);
  doc.text("DATOS DEL PERCEPTOR",14,cy); cy+=6;
  doc.line(14,cy,pw-14,cy); cy+=6;
  drawRow("Nombre:",nombre,true);
  drawRow("Email:",email);
  drawRow("Departamento:",dept);
  drawRow("IRPF aplicado:",irpf+"%",true);
  cy+=4;

  // Tabla de retribuciones
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(30,30,30);
  doc.text("RESUMEN DE RETRIBUCIONES Y RETENCIONES",14,cy); cy+=6;
  doc.line(14,cy,pw-14,cy); cy+=8;

  const drawTableRow=(concepto,importe,bold=false,color=[30,30,30])=>{
    doc.setFont("helvetica",bold?"bold":"normal");
    doc.setTextColor(...color);
    doc.text(concepto,14,cy);
    doc.text(importe.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",pw-14,cy,{align:"right"});
    doc.setDrawColor(240,240,245); doc.line(14,cy+2,pw-14,cy+2);
    cy+=9;
  };

  drawTableRow("Total retribuciones brutas",totalBruto,true);
  drawTableRow(`Retenciones IRPF (${irpf}%)`,totalRet,false,[229,62,62]);
  drawTableRow("Cotizaciones Seguridad Social",totalSS,false,[229,62,62]);
  cy+=2;
  doc.setFillColor(248,252,248); doc.rect(14,cy-4,pw-28,12,"F");
  drawTableRow("LÍQUIDO TOTAL PERCIBIDO",totalNeto,true,[30,100,30]);

  // Nota base imponible
  cy+=6;
  doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(120,120,120);
  doc.text(`Base imponible (sujeta a retención): ${totalBruto.toLocaleString("es-ES",{minimumFractionDigits:2})} €`,14,cy); cy+=5;
  doc.text(`Tipo de retención aplicado: ${irpf}%`,14,cy); cy+=5;
  doc.text(`Este certificado corresponde a los rendimientos del trabajo correspondientes al ejercicio ${anio}.`,14,cy); cy+=5;

  // Firmas
  cy+=14;
  doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
  doc.line(14,cy,80,cy); doc.line(pw-80,cy,pw-14,cy);
  doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text("Firma y sello de la empresa",47,cy+5,{align:"center"});
  doc.text("Firma del perceptor",pw-47,cy+5,{align:"center"});

  // Pie
  doc.setFillColor(248,248,252); doc.rect(0,278,pw,19,"F");
  doc.setFontSize(7); doc.setTextColor(150,150,150);
  doc.text(`InOut Media S.L. · CIF: B-XXXXXXXX · Emitido el ${fechaEmision}`,pw/2,285,{align:"center"});
  doc.text("Documento generado electrónicamente. Válido sin firma física según Ley 59/2003 de firma electrónica.",pw/2,290,{align:"center"});

  doc.save(`certificado_retenciones_${nombre.replace(/ /g,"_")}_${anio}.pdf`);
  toast("Certificado descargado ✓");
}

(async function checkSession(){
  const hash=window.location.hash;
  if(hash&&hash.includes('type=recovery')){
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("panel-login").style.display="none";document.getElementById("panel-reset").style.display="none";
    document.querySelector(".login-card").innerHTML=`
      <div class="login-logo">InOut<span class="logo-dot">.</span></div>
      <div class="login-sub" style="margin-bottom:20px">Establecer nueva contraseña</div>
      <div id="newpass-msg" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;"></div>
      <label class="form-lbl">Nueva contraseña</label><input class="form-input" id="newpass-1" type="password" placeholder="••••••••" autocomplete="new-password"/>
      <label class="form-lbl">Confirmar contraseña</label><input class="form-input" id="newpass-2" type="password" placeholder="••••••••" autocomplete="new-password"/>
      <button class="btn btn-p btn-full" onclick="guardarNuevaPassword()" style="font-size:15px;padding:12px">Guardar contraseña</button>`;
    return;
  }
  const{data:{session}}=await _sb.auth.getSession();
  if(session?.user){
    currentUser=session.user;
    const{data:perfil}=await _sb.from('empleados').select('*').eq('auth_user_id',currentUser.id).single();
    if(perfil){userProfile={nombre:perfil.nombre,role:perfil.role,dept:perfil.departamento||"—",email:perfil.email,irpf:parseFloat(perfil.irpf)||15,salarioBase:parseFloat(perfil.salario_base)||0,tipo:perfil.tipo||"fijo",tlf:perfil.telefono||"—",fechaAlta:perfil.fecha_alta||"—",estado:perfil.estado||"activo",_supabase_id:perfil.id,numero_empleado:perfil.numero_empleado||"—",staff_uid:perfil.staff_uid||"",staff_pin:perfil.staff_pin||"",horas_contrato:parseFloat(perfil.horas_contrato)||40};enterApp();}
  }
})();

async function guardarNuevaPassword(){
  const p1=document.getElementById("newpass-1").value,p2=document.getElementById("newpass-2").value;
  const msg=document.getElementById("newpass-msg");
  const showMsg=(text,isError)=>{msg.style.display="block";msg.style.background=isError?"rgba(255,60,172,.1)":"rgba(200,255,0,.08)";msg.style.border=isError?"1px solid rgba(255,60,172,.2)":"1px solid rgba(200,255,0,.2)";msg.style.color=isError?"var(--a2)":"var(--a1)";msg.textContent=text;};
  if(!p1||!p2){showMsg("⚠️ Rellena ambos campos",true);return;}
  if(p1!==p2){showMsg("⚠️ Las contraseñas no coinciden",true);return;}
  if(p1.length<6){showMsg("⚠️ Mínimo 6 caracteres",true);return;}
  const{data:{user}}=await _sb.auth.getUser();
  if(user){const{data:hist}=await _sb.from('password_history').select('password_hash').eq('user_id',user.id);if(hist&&hist.length>0){const hashNew=await hashPassword(p1);if(hist.some(h=>h.password_hash===hashNew)){showMsg("⚠️ No puedes usar una contraseña anterior.",true);return;}}}
  const{error}=await _sb.auth.updateUser({password:p1});if(error){showMsg("Error: "+error.message,true);return;}
  if(user){const hashNew=await hashPassword(p1);await _sb.from('password_history').insert({user_id:user.id,password_hash:hashNew});}
  showMsg("✅ Contraseña actualizada. Redirigiendo…",false);setTimeout(async()=>{await _sb.auth.signOut();window.location.hash="";window.location.href=window.location.pathname;},1500);
}

async function hashPassword(pass){const data=new TextEncoder().encode(pass);const buf=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
